    <script>
      (function () {
        try {
          var t = localStorage.getItem('color-mode');
          if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }

          var appTheme = localStorage.getItem('app-theme') || 'default';
          var appFont = localStorage.getItem('app-font') || 'inter';
          if (appTheme !== 'default') {
            document.documentElement.classList.add('theme-' + appTheme);
            document.documentElement.setAttribute('data-accent', '');
          }
          document.documentElement.classList.add('font-' + appFont);
        } catch (e) {}
      })();
    </script>

    <script>

        return {
          get: () => state,
          set(updater) {
            const patch = typeof updater === 'function' ? updater(state) : updater;
            state = { ...state, ...patch };
            listeners.forEach((fn) => fn(state));
          },
          subscribe(fn) {
            listeners.add(fn);
            return () => listeners.delete(fn);
          }
        };

          { type: 'improved', module: 'Todos',    text: "Status filter hidden when kanban board view is active" },
          { type: 'improved', module: 'Todos',    text: "Tooltip on truncated kanban card titles" },

      const store = createStore({
        changelog: CHANGELOG,
        selectedModule: '',
        lastSeen: null,
        sidebarCollapsed: false,
        sidebarMobileOpen: false
      });

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function formatDate(iso) {
        const d = new Date(iso + 'T00:00:00');
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      }

      function isAfterISO(a, b) {
        return new Date(a) > new Date(b);
      }

      function availableModules() {
        const set = new Set();
        for (const e of CHANGELOG) for (const c of e.changes) set.add(c.module);
        return [...set];
      }

      function summarize(changes) {
        const counts = {};
        for (const c of changes) counts[c.type] = (counts[c.type] || 0) + 1;
        return counts;
      }

      function isNew(date) {
        const { lastSeen } = store.get();
        if (!lastSeen) return true;
        return isAfterISO(date, lastSeen);
      }

      function el(tag, attrs = {}, children = []) {
        const node = document.createElement(tag);
        for (const [k, v] of Object.entries(attrs)) {
          if (v == null || v === false) continue;
          if (k === 'class') node.className = v;
          else if (k === 'style') node.setAttribute('style', v);
          else if (k.startsWith('on') && typeof v === 'function') node[k] = v;
          else node.setAttribute(k, v === true ? '' : v);
        }
        for (const c of [].concat(children)) {
          if (c == null || c === false) continue;
          node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
        }
        return node;
      }

      function lucideEl(name, cls, extra = {}) {
        return el('i', { 'data-lucide': name, class: cls, ...extra });
      }

      function clear(node) {
        while (node.firstChild) node.removeChild(node.firstChild);
      }

      function renderTabs() {
        const { selectedModule } = store.get();
        const mods = ['', ...availableModules()];
        const root = document.getElementById('module-tabs');
        clear(root);
        for (const m of mods) {
          const active = m === selectedModule;
          const label = m === '' ? 'All' : m;
          const cmt = m === '' ? 'changelog-tab-all' : `changelog-tab-${m.toLowerCase().replace(/\s+/g, '-')}`;
          const btn = el('button', {
            type: 'button',
            role: 'tab',
            'data-comment': cmt,
            'aria-selected': String(active),
            onclick: () => selectModule(m),
            class:
              'tab-pill px-3.5 py-1.5 rounded-full text-sm font-medium transition-colors duration-100 cursor-pointer select-none whitespace-nowrap outline-none text-stone-500 dark:text-stone-400 hover:text-stone-700 dark:hover:text-stone-300'
          });
          if (m === '') {
            btn.appendChild(document.createTextNode('All'));
          } else {
            const wrap = el('span', { class: 'flex items-center gap-1.5' });
            wrap.appendChild(lucideEl(MODULES[m]?.icon ?? 'box', 'w-3.5 h-3.5 shrink-0'));
            wrap.appendChild(document.createTextNode(label));
            btn.appendChild(wrap);
          }
          root.appendChild(btn);
        }
      }

      function renderEntry(entry, idx) {
        const wrap = el('div', { 'data-comment': `changelog-entry-${idx}` });

        const head = el('div', { 'data-comment': `changelog-entry-${idx}-header`, class: 'flex items-center gap-3 mb-4' });
        const dateBlock = el('div', { class: 'flex items-center gap-2.5' });
        dateBlock.appendChild(
          el(
            'time',
            {
              'data-comment': `changelog-entry-${idx}-date`,
              class: 'text-sm font-semibold text-stone-900 dark:text-stone-50 whitespace-nowrap'
            },
            formatDate(entry.date)
          )
        );
        if (isNew(entry.date)) {
          dateBlock.appendChild(
            el(
              'span',
              {
                'data-comment': `changelog-new-${idx}`,
                class:
                  'text-[10px] font-bold uppercase tracking-wide px-1.5 py-0.5 rounded-md bg-brand-500 text-white'
              },
              'New'
            )
          );
        }
        head.appendChild(dateBlock);

        const summary = el('div', {
          'data-comment': `changelog-entry-${idx}-summary`,
          class: 'flex items-center gap-1.5'
        });
        const counts = summarize(entry.changes);
        for (const [type, count] of Object.entries(counts)) {
          const t = CHANGE_TYPES[type];
          summary.appendChild(
            el(
              'span',
              {
                'data-comment': `changelog-summary-${idx}-${type}`,
                class:
                  'inline-flex items-center gap-1 text-[11px] font-medium px-1.5 py-0.5 rounded-md',
                style: `color:${t.color};background:${t.color}15`
              },
              `${count} ${t.label.toLowerCase()}`
            )
          );
        }
        head.appendChild(summary);
        head.appendChild(el('span', { class: 'h-px flex-1 bg-stone-100 dark:bg-stone-800' }));
        wrap.appendChild(head);

        const tableWrap = el('div', {
          'data-comment': `changelog-entry-${idx}-table`,
          class: 'rounded-xl border border-stone-200 dark:border-stone-800 overflow-hidden'
        });
        const table = el('table', {
          'data-comment': `changelog-entry-${idx}-table-el`,
          'data-component': 'table',
          class: 'w-full text-sm'
        });
        const tbody = el('tbody', { 'data-comment': `changelog-entry-${idx}-tbody` });
        entry.changes.forEach((c, i) => {
          const t = CHANGE_TYPES[c.type];
          const tr = el('tr', {
            'data-comment': `changelog-row-${idx}-${i}`,
            class: 'border-b border-stone-100 dark:border-stone-800 last:border-0'
          });
          const tdType = el('td', { 'data-comment': `changelog-row-${idx}-${i}-type-cell`, class: 'px-4 py-3 w-28' });
          const typePill = el(
            'span',
            {
              'data-comment': `changelog-row-${idx}-${i}-type`,
              class:
                'inline-flex items-center gap-1.5 text-[11px] font-semibold uppercase tracking-wide px-2 py-0.5 rounded-md whitespace-nowrap',
              style: `color:${t.color};background:${t.color}18`
            },
            [lucideEl(t.icon, 'w-3 h-3 shrink-0'), document.createTextNode(t.label)]
          );
          tdType.appendChild(typePill);

          const tdMod = el('td', { 'data-comment': `changelog-row-${idx}-${i}-module-cell`, class: 'px-4 py-3 w-36' });
          const modPill = el(
            'span',
            {
              'data-comment': `changelog-row-${idx}-${i}-module`,
              class:
                'inline-flex items-center gap-1.5 text-xs font-medium text-stone-500 dark:text-stone-400 whitespace-nowrap'
            },
            [
              lucideEl(
                MODULES[c.module]?.icon ?? 'box',
                'w-3.5 h-3.5 shrink-0 text-stone-400 dark:text-stone-500'
              ),
              document.createTextNode(c.module)
            ]
          );
          tdMod.appendChild(modPill);

          const tdText = el(
            'td',
            {
              'data-comment': `changelog-row-${idx}-${i}-text`,
              class: 'px-4 py-3 text-stone-700 dark:text-stone-300'
            },
            c.text
          );

          tr.appendChild(tdType);
          tr.appendChild(tdMod);
          tr.appendChild(tdText);
          tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        tableWrap.appendChild(table);
        wrap.appendChild(tableWrap);
        return wrap;
      }

      function renderEmpty() {
        const wrap = el('div', {
          'data-comment': 'changelog-empty',
          class: 'flex flex-col items-center justify-center gap-3 py-12 text-center'
        });
        const ico = el('div', {

        { kind: 'user', title: 'Sarah Chen', subtitle: 'Foreman · Operations', icon: 'users', href: 'employees.html#user-2', meta: 'active', metaColor: '#22c55e' }
      ];
      const CMD_PARITY_GROUP_META = {
        page: { label: 'Pages', icon: 'layout-grid' },
        job: { label: 'Jobs', icon: 'hard-hat' },
        task: { label: 'Tasks', icon: 'hammer' },
        todo: { label: 'Todos', icon: 'check-square' },
        user: { label: 'Users', icon: 'users' }
      };
      const CMD_PARITY_GROUP_ORDER = ['page', 'job', 'task', 'todo', 'user'];
      let cmdParityActiveIndex = 0;
      let cmdParityQuery = '';
      let cmdParityFlatItems = [];
      function cmdParityEscape(value) {
        return String(value ?? '').replace(/[&<>"']/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
      }
      function cmdParityHighlight(value, query, key) {
        const text = String(value ?? '');
        const q = query.trim();
        if (!q) return cmdParityEscape(text);
        const lower = text.toLowerCase();
        const needle = q.toLowerCase();
        let cursor = 0;
        let markIndex = 0;
        let html = '';
        while (true) {
          const idx = lower.indexOf(needle, cursor);
          if (idx === -1) break;
          html += cmdParityEscape(text.slice(cursor, idx));
          html += `<mark data-comment="${key}-mark-${markIndex++}">${cmdParityEscape(text.slice(idx, idx + q.length))}</mark>`;
          cursor = idx + q.length;
        }
        html += cmdParityEscape(text.slice(cursor));
        return html;
      }
      function ensureCmdPaletteStructure() {
        const panel = document.getElementById('cmd-palette')?.querySelector('.cmd-palette-panel');
        if (!panel) return;
        const searchWrap = panel.querySelector('[data-comment="cmd-palette-search-wrap"]');
        if (searchWrap) {
          searchWrap.innerHTML = `
            <div data-comment="cmd-palette-search-field" class="cmd-palette-search-field">
              <i data-comment="cmd-palette-search-icon" data-lucide="search" class="w-4 h-4 text-stone-400 shrink-0"></i>
              <input id="cmd-palette-input" data-comment="cmd-palette-input" data-component="input" type="text" placeholder="Search jobs, tasks, todos..." class="flex-1 bg-transparent text-sm text-stone-900 dark:text-stone-50 placeholder:text-stone-400 outline-none border-0" autocomplete="off" oninput="onCmdPaletteInput(event)" onkeydown="onCmdPaletteKey(event)" />
              <kbd data-comment="cmd-palette-search-esc" class="cmd-kbd">ESC</kbd>
            </div>`;
        }
        const results = document.getElementById('cmd-palette-results');
        if (results) results.className = 'cmd-palette-result-scroll';
        let footer = panel.querySelector('[data-comment="cmd-palette-footer"]');
        if (!footer) {
          footer = document.createElement('div');
          footer.setAttribute('data-comment', 'cmd-palette-footer');
          footer.className = 'cmd-palette-footer';
          footer.innerHTML = `
            <div data-comment="cmd-palette-footer-navigate" class="cmd-footer-help">
              <kbd data-comment="cmd-palette-footer-up" class="cmd-kbd"><i data-comment="cmd-palette-footer-up-icon" data-lucide="arrow-up" class="w-2.5 h-2.5"></i></kbd>
              <kbd data-comment="cmd-palette-footer-down" class="cmd-kbd"><i data-comment="cmd-palette-footer-down-icon" data-lucide="arrow-down" class="w-2.5 h-2.5"></i></kbd>
              <span data-comment="cmd-palette-footer-navigate-text">Navigate</span>
            </div>
            <div data-comment="cmd-palette-footer-open" class="cmd-footer-help"><kbd data-comment="cmd-palette-footer-enter" class="cmd-kbd">↵</kbd><span data-comment="cmd-palette-footer-open-text">Open</span></div>
            <div data-comment="cmd-palette-footer-close" class="cmd-footer-help"><kbd data-comment="cmd-palette-footer-esc" class="cmd-kbd">ESC</kbd><span data-comment="cmd-palette-footer-close-text">Close</span></div>`;
          panel.appendChild(footer);
        }
      }
      function openCmdPalette() {
        const root = document.getElementById('cmd-palette');
        if (!root) return;
        ensureCmdPaletteStructure();
        root.classList.add('is-open');
        cmdParityQuery = '';
        cmdParityActiveIndex = 0;
        renderCmdPalette();
        const input = document.getElementById('cmd-palette-input');
        if (input) {
          input.value = '';
          setTimeout(() => input.focus(), 40);
        }
        if (window.lucide) lucide.createIcons();
      }
      function closeCmdPalette() {
        const root = document.getElementById('cmd-palette');
        if (root) root.classList.remove('is-open');
      }
      function onCmdPaletteInput(event) {
        cmdParityQuery = event.target.value;
        cmdParityActiveIndex = 0;
        renderCmdPalette();
      }
      function cmdFiltered() {
        const q = cmdParityQuery.trim().toLowerCase();
        if (!q || q.length < 3) return [];
        return CMD_PARITY_ITEMS.filter((item) =>
          item.title.toLowerCase().includes(q) || item.subtitle.toLowerCase().includes(q) || String(item.meta || '').toLowerCase().includes(q)
        );
      }
      function renderCmdCenteredState(type) {
        const root = document.getElementById('cmd-palette-results');
        if (!root) return;
        const query = cmdParityEscape(cmdParityQuery.trim());
        const content = {
          idle: `<p data-comment="cmd-palette-idle-text" class="text-sm text-stone-400 dark:text-stone-500 m-0">Type to search across jobs, tasks, todos...</p>`,
          short: `<p data-comment="cmd-palette-short-text" class="text-sm text-stone-400 dark:text-stone-500 m-0">Type at least 3 characters to search...</p>`,
          empty: `<i data-comment="cmd-palette-empty-icon" data-lucide="search-x" class="w-8 h-8 mb-3 opacity-30 text-stone-400"></i><p data-comment="cmd-palette-empty-text" class="text-sm text-stone-400 dark:text-stone-500 m-0">No results for <span data-comment="cmd-palette-empty-query" class="font-medium text-stone-600 dark:text-stone-300">&quot;${query}&quot;</span></p>`
        }[type];
        root.innerHTML = `<div data-comment="cmd-palette-${type}" class="flex flex-col items-center justify-center h-full text-center">${content}</div>`;
        cmdParityFlatItems = [];
        if (window.lucide) lucide.createIcons();
      }
      function renderCmdPalette() {
        ensureCmdPaletteStructure();
        const root = document.getElementById('cmd-palette-results');
        if (!root) return;
        const q = cmdParityQuery.trim();
        if (!q) { renderCmdCenteredState('idle'); return; }
        if (q.length < 3) { renderCmdCenteredState('short'); return; }
        const items = cmdFiltered();
        if (!items.length) { renderCmdCenteredState('empty'); return; }
        const groups = {};
        items.forEach((item) => { (groups[item.kind] = groups[item.kind] || []).push(item); });
        cmdParityFlatItems = [];
        const parts = [];
        CMD_PARITY_GROUP_ORDER.forEach((kind) => {
          const groupItems = groups[kind];
          if (!groupItems?.length) return;
          const meta = CMD_PARITY_GROUP_META[kind];
          parts.push(`<div data-comment="cmd-palette-section-${kind}" class="cmd-section-header"><i data-comment="cmd-palette-section-${kind}-icon" data-lucide="${meta.icon}" class="w-3.5 h-3.5 text-stone-400"></i><span data-comment="cmd-palette-section-${kind}-label">${meta.label}</span></div>`);
          groupItems.forEach((item) => {
            const index = cmdParityFlatItems.length;
            cmdParityFlatItems.push(item);
            const active = index === cmdParityActiveIndex;
            const titleKey = `cmd-palette-result-${index}-title`;
            const subtitleKey = `cmd-palette-result-${index}-subtitle`;
            const tag = item.meta ? `<span data-comment="cmd-palette-result-${index}-tag" class="cmd-tag"><span data-comment="cmd-palette-result-${index}-tag-dot" class="cmd-tag-dot" style="background:${item.metaColor || '#a8a29e'}"></span>${cmdParityEscape(item.meta)}</span>` : `<span data-comment="cmd-palette-result-${index}-kind" class="text-[10px] uppercase tracking-wider font-semibold text-stone-400 dark:text-stone-500 shrink-0">${cmdParityEscape(item.kind)}</span>`;
            parts.push(`
              <button type="button" data-comment="cmd-palette-result-${index}" data-href="${cmdParityEscape(item.href)}" onclick="selectCmdPaletteItem(${index})" onmouseenter="setCmdActiveIndex(${index})" class="cmd-result${active ? ' is-active' : ''}">
                <div data-comment="cmd-palette-result-${index}-body" class="flex-1 min-w-0">
                  <p data-comment="${titleKey}" class="text-sm font-medium text-stone-900 dark:text-stone-50 truncate m-0">${cmdParityHighlight(item.title, q, titleKey)}</p>
                  <p data-comment="${subtitleKey}" class="text-xs text-stone-400 dark:text-stone-500 truncate mt-0.5 m-0">${cmdParityHighlight(item.subtitle, q, subtitleKey)}</p>
                </div>
                ${tag}
              </button>`);
          });
        });
        root.innerHTML = parts.join('');
        if (window.lucide) lucide.createIcons();
      }
      function setCmdActiveIndex(index) {
        cmdParityActiveIndex = index;
        document.querySelectorAll('.cmd-result').forEach((button, i) => button.classList.toggle('is-active', i === index));
      }
      function selectCmdPaletteItem(index) {
        const item = cmdParityFlatItems[index];
        if (!item) return;
        closeCmdPalette();
        window.location.href = item.href;
      }
      function onCmdPaletteKey(event) {
        if (event.key === 'Escape') { event.preventDefault(); closeCmdPalette(); return; }
        if (!cmdParityFlatItems.length) return;
        if (event.key === 'ArrowDown') {
          event.preventDefault();
          setCmdActiveIndex(Math.min(cmdParityFlatItems.length - 1, cmdParityActiveIndex + 1));
        } else if (event.key === 'ArrowUp') {
          event.preventDefault();
          setCmdActiveIndex(Math.max(0, cmdParityActiveIndex - 1));
        } else if (event.key === 'Enter') {
          event.preventDefault();
          selectCmdPaletteItem(cmdParityActiveIndex);
        }
      }
      document.addEventListener('DOMContentLoaded', ensureCmdPaletteStructure);</script>
  
      <div id="cmd-palette" data-comment="cmd-palette" data-component="dialog" class="cmd-palette-root">
        <div class="cmd-palette-backdrop" onclick="closeCmdPalette()">
          <div class="cmd-palette-panel" data-comment="cmd-palette-panel" onclick="event.stopPropagation()">
            <div data-comment="cmd-palette-search-wrap" class="p-3 border-b border-stone-200 dark:border-stone-800 shrink-0">
              <div class="flex items-center gap-2.5 px-4 h-9 rounded-full bg-stone-100 dark:bg-stone-800 border border-transparent">
                <i data-lucide="search" class="w-4 h-4 text-stone-400 shrink-0"></i>
                <input id="cmd-palette-input" data-comment="cmd-palette-input" data-component="input" type="text" placeholder="Search jobs, tasks, todos..." class="flex-1 bg-transparent text-sm text-stone-900 dark:text-stone-50 placeholder:text-stone-400 outline-none border-0" oninput="onCmdPaletteInput(event)" onkeydown="onCmdPaletteKey(event)" />
                <kbd class="inline-flex items-center text-[10px] font-medium text-stone-400 border border-stone-300 dark:border-stone-600 rounded px-1.5 py-0.5 bg-white dark:bg-stone-700 leading-none">ESC</kbd>
              </div>
            </div>
            <div data-comment="cmd-palette-results" id="cmd-palette-results" class="flex-1 overflow-y-auto"></div>
          </div>
        </div>
      </div>

  </body>
