    <script>
      (function () {
        try {
          var t = localStorage.getItem('color-mode');
          if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }

          var appTheme = localStorage.getItem('app-theme') || 'default';
          var appFont = localStorage.getItem('app-font') || 'inter';
          if (appTheme !== 'default') {
            document.documentElement.classList.add('theme-' + appTheme);
            document.documentElement.setAttribute('data-accent', '');
          }
          document.documentElement.classList.add('font-' + appFont);
        } catch (e) {}
      })();
    </script>

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>

</style>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script>
      function createStore(initialState) {
        let state = structuredClone(initialState);
        const listeners = new Set();
        return {
          get: () => state,
          set(updater) {
            const patch = typeof updater === 'function' ? updater(state) : updater;
            state = { ...state, ...patch };
            listeners.forEach((fn) => fn(state));
          },
          subscribe(fn) {
            listeners.add(fn);
            return () => listeners.delete(fn);
          }
        };
      }

      const TASK_TYPES = [
        { value: 'Forming',    label: 'Forming',    short: 'FM', color: '#3b82f6' },
        { value: 'Flatwork',   label: 'Flatwork',   short: 'FL', color: '#10b981' },
        { value: 'Excavating', label: 'Excavating', short: 'EX', color: '#f59e0b' }
      ];

      function taskType(value) {
        return TASK_TYPES.find((t) => t.value === value) ?? { value, label: value, short: '?', color: '#a8a29e' };
      }

      function isoOffset(days) {
        return new Date(Date.now() + days * 86400000).toISOString().slice(0, 10);
      }

      const TODAY = new Date().toISOString().slice(0, 10);

      const TASKS = [
        { autoid: 1,  job_id: 1042, descr: 'Pour foundation slab — north wing', type: 'Flatwork',   start_date: isoOffset(2),  end_date: isoOffset(3),  completed: false },
        { autoid: 2,  job_id: 1042, descr: 'Form wall sections A1–A4',          type: 'Forming',    start_date: isoOffset(4),  end_date: isoOffset(6),  completed: false },
        { autoid: 3,  job_id: 1058, descr: 'Excavate basement footprint',       type: 'Excavating', start_date: isoOffset(1),  end_date: isoOffset(4),  completed: false },
        { autoid: 4,  job_id: 1061, descr: 'Driveway flatwork pour',            type: 'Flatwork',   start_date: isoOffset(7),  end_date: isoOffset(8),  completed: false },
        { autoid: 5,  job_id: 1063, descr: 'Form footings — east elevation',    type: 'Forming',    start_date: isoOffset(9),  end_date: isoOffset(11), completed: false },
        { autoid: 6,  job_id: 1064, descr: 'Trench utilities corridor',         type: 'Excavating', start_date: isoOffset(12), end_date: isoOffset(13), completed: false },
        { autoid: 7,  job_id: 1029, descr: 'Garage slab finish',                type: 'Flatwork',   start_date: isoOffset(-3), end_date: isoOffset(-1), completed: true  },
        { autoid: 8,  job_id: 1031, descr: 'Retaining wall forms strip',        type: 'Forming',    start_date: isoOffset(-1), end_date: isoOffset(1),  completed: false },
        { autoid: 9,  job_id: 1067, descr: 'Sidewalk pour — phase 2',           type: 'Flatwork',   start_date: isoOffset(13), end_date: isoOffset(14), completed: false },
        { autoid: 10, job_id: 1071, descr: 'Footings excavation — south',       type: 'Excavating', start_date: isoOffset(5),  end_date: isoOffset(7),  completed: false },
        { autoid: 11, job_id: 1024, descr: 'Curb forms — completed',            type: 'Forming',    start_date: isoOffset(-10),end_date: isoOffset(-8), completed: true  },
        { autoid: 12, job_id: 1075, descr: 'Overdue: pad pour',                 type: 'Flatwork',   start_date: isoOffset(-15),end_date: isoOffset(-2), completed: false }
      ];

      const store = createStore({
        tasks: TASKS,
        pending: false,
        sidebarCollapsed: false,
        sidebarMobileOpen: false
      });

      function el(tag, attrs = {}, children = []) {
        const node = document.createElement(tag);
        for (const [k, v] of Object.entries(attrs)) {
          if (v == null || v === false) continue;
          if (k === 'class') node.className = v;
          else if (k === 'style') node.setAttribute('style', v);
          else if (k.startsWith('on') && typeof v === 'function') node[k] = v;
          else node.setAttribute(k, v === true ? '' : v);
        }
        for (const c of [].concat(children)) {
          if (c == null || c === false) continue;
          node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
        }
        return node;
      }

      function lucideEl(name, cls, extra = {}) {
        return el('i', { 'data-lucide': name, class: cls, ...extra });
      }

      function clear(node) {
        while (node.firstChild) node.removeChild(node.firstChild);
      }

      function formatDate(iso) {
        return new Date(iso + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      }

      function taskStats() {
        const all = store.get().tasks;
        const withDates = all.filter((t) => t.start_date && t.end_date);
        return {
          total: all.length,
          active: withDates.filter((t) => t.start_date <= TODAY && TODAY <= t.end_date && !t.completed).length,
          completed: all.filter((t) => t.completed).length,
          overdue: withDates.filter((t) => t.end_date < TODAY && !t.completed).length
        };
      }

      function statCards() {
        const s = taskStats();
        return [
          { key: 'total',     label: 'Total Tasks', value: s.total,     desc: 'All tasks across jobs', icon: 'list-checks',     iconBg: 'bg-brand-50 dark:bg-brand-950',     iconColor: 'text-brand-500 dark:text-brand-400' },
          { key: 'active',    label: 'Active',      value: s.active,    desc: 'Tasks running today',   icon: 'hammer',          iconBg: 'bg-blue-50 dark:bg-blue-950',       iconColor: 'text-blue-500 dark:text-blue-400' },
          { key: 'completed', label: 'Completed',   value: s.completed, desc: 'Marked as done',        icon: 'circle-check-big',iconBg: 'bg-emerald-50 dark:bg-emerald-950', iconColor: 'text-emerald-500 dark:text-emerald-400' },
          { key: 'overdue',   label: 'Overdue',     value: s.overdue,   desc: 'Past end date, not done', icon: 'triangle-alert',
            iconBg: s.overdue ? 'bg-red-50 dark:bg-red-950' : 'bg-stone-100 dark:bg-stone-800',
            iconColor: s.overdue ? 'text-red-500 dark:text-red-400' : 'text-stone-500 dark:text-stone-400' }
        ];
      }

      function upcomingTasks() {
        const in14 = isoOffset(14);
        return store
          .get()
          .tasks.filter((t) => t.start_date && t.start_date > TODAY && t.start_date <= in14)
          .sort((a, b) => a.start_date.localeCompare(b.start_date))
          .slice(0, 10);
      }

      function renderStatCard(card) {
        const root = el('div', {
          'data-comment': `dashboard-stat-${card.key}`,
          'data-component': 'card',
          class: 'card p-6 flex flex-col h-full'
        });
        const inner = el('div', { class: 'flex flex-col gap-3' });
        const top = el('div', { class: 'flex items-center justify-between' });
        top.appendChild(
          el('span', { 'data-comment': `dashboard-stat-${card.key}-label`, class: 'text-sm text-stone-500 dark:text-stone-400' }, card.label)
        );
        const ico = el('div', {
          'data-comment': `dashboard-stat-${card.key}-icon`,
          class: `w-7 h-7 rounded-full flex items-center justify-center shrink-0 ${card.iconBg}`
        });
        ico.appendChild(lucideEl(card.icon, `w-3.5 h-3.5 ${card.iconColor}`));
        top.appendChild(ico);
        inner.appendChild(top);
        inner.appendChild(
          el(
            'p',
            {
              'data-comment': `dashboard-stat-${card.key}-value`,
              class: 'text-3xl font-bold text-stone-900 dark:text-stone-50 tabular-nums leading-none m-0'
            },
            String(card.value)
          )
        );
        inner.appendChild(
          el(
            'p',
            {
              'data-comment': `dashboard-stat-${card.key}-desc`,
              class: 'text-xs text-stone-500 dark:text-stone-400 m-0'
            },
            card.desc
          )
        );
        root.appendChild(inner);
        return root;
      }

      function renderStats() {
        const root = document.getElementById('dashboard-stats');
        clear(root);
        for (const card of statCards()) root.appendChild(renderStatCard(card));
        if (window.lucide) lucide.createIcons();
      }

      function renderUpcomingItem(task, idx) {
        const t = taskType(task.type);
        const a = el('a', {
          'data-comment': `upcoming-item-${idx}`,
          href: `calendar.html#task-${task.autoid}`,
          class: 'flex items-center gap-3 p-3 rounded-xl bg-stone-50 dark:bg-stone-900 hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors duration-100 no-underline'
        });
        const left = el('div', { class: 'flex-1 min-w-0' });
        left.appendChild(
          el(
            'p',
            {
              'data-comment': `upcoming-item-${idx}-meta`,
              class: 'text-[10px] font-medium uppercase tracking-wider text-stone-400 dark:text-stone-500 m-0'
            },
            `#${task.job_id} · Starts ${formatDate(task.start_date)}`
          )
        );
        left.appendChild(
          el(
            'p',
            {
              'data-comment': `upcoming-item-${idx}-descr`,
              class: 'text-sm font-medium text-stone-900 dark:text-stone-50 truncate mt-0.5 m-0'
            },
            task.descr
          )
        );
        a.appendChild(left);

        const tag = el(
          'span',
          {
            'data-comment': `upcoming-item-${idx}-tag`,
            'data-component': 'badge',
            class: 'inline-flex items-center justify-center text-xs font-medium px-2 py-0.5 rounded-full gap-1 border',
            style: `border-color:${t.color}66;background:${t.color}1a;color:${t.color}`
          },
          [
            el('span', { class: 'w-1.5 h-1.5 rounded-full shrink-0', style: 'background:currentColor' }),
            document.createTextNode(t.label)
          ]
        );
        a.appendChild(tag);
        return a;
      }

      function renderEmpty() {
        const wrap = el('div', {
          'data-comment': 'upcoming-empty',
          class: 'flex flex-col items-center justify-center gap-3 py-12 text-center'
        });
        const ico = el('div', {
          class: 'w-10 h-10 rounded-3xl bg-stone-50 dark:bg-stone-800 flex items-center justify-center'
        });
        ico.appendChild(lucideEl('calendar-check', 'w-8 h-8 text-stone-400 dark:text-stone-500'));
        wrap.appendChild(ico);
        const inner = el('div');
        inner.appendChild(
          el(
            'p',
            {
              'data-comment': 'upcoming-empty-title',
              class: 'text-sm font-semibold text-stone-900 dark:text-stone-50 m-0'
            },
            'No upcoming tasks'
          )
        );
        inner.appendChild(
          el(
            'p',
            {
              'data-comment': 'upcoming-empty-desc',
              class: 'text-xs text-stone-400 dark:text-stone-500 mt-0.5 m-0'
            },
            'No tasks starting in the next 14 days'
          )
        );
        wrap.appendChild(inner);
        return wrap;
      }

      function renderUpcoming() {
        const root = document.getElementById('upcoming-list');
        clear(root);
        const list = upcomingTasks();
        if (!list.length) {
          root.className = 'flex-1 flex flex-col';
          root.appendChild(renderEmpty());
          return;
        }
        root.className = 'grid grid-cols-1 lg:grid-cols-2 gap-2';
        list.forEach((task, i) => root.appendChild(renderUpcomingItem(task, i)));
        if (window.lucide) lucide.createIcons();
      }

      function toggleSidebar() {
        const isLg = window.matchMedia('(min-width: 1024px)').matches;
        if (isLg) store.set((s) => ({ sidebarCollapsed: !s.sidebarCollapsed }));
        else store.set((s) => ({ sidebarMobileOpen: !s.sidebarMobileOpen }));
      }

      function closeMobileSidebar() {
        store.set({ sidebarMobileOpen: false });
      }

      function applySidebarState() {
        const { sidebarCollapsed, sidebarMobileOpen } = store.get();
        const sb = document.getElementById('sidebar');
        const wrap = document.getElementById('main-wrap');
        const backdrop = document.getElementById('sidebar-backdrop');
        const collapseIco = document.getElementById('ico-collapse');
        const expandIco = document.getElementById('ico-expand');

        sb.classList.toggle('lg:w-16', sidebarCollapsed);
        sb.classList.toggle('sb-collapsed', sidebarCollapsed);
        sb.classList.toggle('lg:w-64', !sidebarCollapsed);
        sb.classList.toggle('translate-x-0', sidebarMobileOpen);
        sb.classList.toggle('-translate-x-full', !sidebarMobileOpen);

        wrap.classList.toggle('lg:ms-16', sidebarCollapsed);
        wrap.classList.toggle('lg:ms-64', !sidebarCollapsed);

        backdrop.classList.toggle('is-open', !!sidebarMobileOpen);

        document.querySelectorAll('.sidebar-label').forEach((label) => {
          label.classList.toggle('lg:hidden', sidebarCollapsed);
        });

        const isLg = window.matchMedia('(min-width: 1024px)').matches;
        collapseIco.style.display = (isLg && !sidebarCollapsed) ? 'block' : 'none';
        expandIco.style.display = (isLg && sidebarCollapsed) ? 'block' : 'none';
      }


      const UI_THEMES = [
        { value: 'red', label: 'Red', color: 'oklch(63.7% 0.237 25)' },
        { value: 'orange', label: 'Orange', color: 'oklch(73.5% 0.197 55)' },
        { value: 'amber', label: 'Amber', color: 'oklch(68% 0.19 75)' },
        { value: 'yellow', label: 'Yellow', color: 'oklch(84.8% 0.197 95)' },
        { value: 'lime', label: 'Lime', color: 'oklch(76.8% 0.233 130)' },
        { value: 'green', label: 'Green', color: 'oklch(62.3% 0.17 145)' },
        { value: 'emerald', label: 'Emerald', color: 'oklch(69.6% 0.167 165)' },
        { value: 'teal', label: 'Teal', color: 'oklch(58% 0.16 185)' },
        { value: 'cyan', label: 'Cyan', color: 'oklch(71.5% 0.143 205)' },
        { value: 'sky', label: 'Sky', color: 'oklch(68.6% 0.148 230)' },
        { value: 'blue', label: 'Blue', color: 'oklch(62.3% 0.214 255)' },
        { value: 'indigo', label: 'Indigo', color: 'oklch(58.5% 0.233 270)' },
        { value: 'violet', label: 'Violet', color: 'oklch(61.9% 0.246 290)' },
        { value: 'purple', label: 'Purple', color: 'oklch(62.7% 0.25 305)' },
        { value: 'fuchsia', label: 'Fuchsia', color: 'oklch(66.7% 0.254 320)' },
        { value: 'pink', label: 'Pink', color: 'oklch(71.4% 0.203 350)' },
        { value: 'rose', label: 'Rose', color: 'oklch(59% 0.21 10)' },
        { value: 'slate', label: 'Slate', color: 'oklch(54% 0.17 245)' }
      ];
      const UI_FONTS = [
        { value: 'plus-jakarta', label: 'Plus Jakarta Sans', sample: 'Aa', family: 'Plus Jakarta Sans, sans-serif' },
        { value: 'inter', label: 'Inter', sample: 'Aa', family: 'Inter, sans-serif' },
        { value: 'jetbrains', label: 'JetBrains Mono', sample: 'Aa', family: 'JetBrains Mono, monospace' }
      ];
      function getAppTheme() { try { return localStorage.getItem('app-theme') || 'default'; } catch (e) { return 'default'; } }
      function getAppFont() { try { return localStorage.getItem('app-font') || 'inter'; } catch (e) { return 'inter'; } }
      function applyUITheme() {
        const root = document.documentElement;
        UI_THEMES.forEach((t) => root.classList.remove('theme-' + t.value));
        UI_FONTS.forEach((f) => root.classList.remove('font-' + f.value));
        const theme = getAppTheme();
        const font = getAppFont();
        if (theme !== 'default') { root.classList.add('theme-' + theme); root.setAttribute('data-accent', ''); }
        else root.removeAttribute('data-accent');
        root.classList.add('font-' + font);
      }
      function renderThemePicker() {
        const root = document.getElementById('theme-picker-content');
        if (!root) return;
        const theme = getAppTheme();
        const font = getAppFont();
        const fontButtons = UI_FONTS.map((f) => `
          <button type="button" data-comment="theme-font-${f.value}" data-component="button" onclick="setAppFont('${f.value}')" style="font-family:${f.family}" class="theme-font-button flex flex-col justify-center items-center gap-1 px-2 py-1.5 rounded-md text-xs font-medium transition-colors cursor-pointer ${font === f.value ? 'bg-stone-100 dark:bg-stone-800 text-stone-900 dark:text-stone-50' : 'text-stone-500 dark:text-stone-400 hover:bg-stone-100 dark:hover:bg-stone-800'}">
            <span data-comment="theme-font-${f.value}-sample" class="text-base leading-none">${f.sample}</span>
            <span data-comment="theme-font-${f.value}-label" class="text-[10px] truncate max-w-full">${f.label}</span>
          </button>`).join('');
        const colorButtons = UI_THEMES.map((t) => `
          <button type="button" data-comment="theme-color-${t.value}" data-component="button" title="${t.label}" aria-label="${t.label}" aria-pressed="${theme === t.value}" onclick="setAppTheme('${t.value}')" class="theme-swatch-button w-full h-7 rounded-lg flex items-center justify-center cursor-pointer transition-transform hover:scale-110" style="color:${t.color}">
            <span data-comment="theme-color-${t.value}-swatch" class="w-4 h-4 rounded-full ring-1 ring-black/10" style="background:${t.color}"></span>
          </button>`).join('');

            const active = index === cmdParityActiveIndex;
            const titleKey = `cmd-palette-result-${index}-title`;
            const subtitleKey = `cmd-palette-result-${index}-subtitle`;
            const tag = item.meta ? `<span data-comment="cmd-palette-result-${index}-tag" class="cmd-tag"><span data-comment="cmd-palette-result-${index}-tag-dot" class="cmd-tag-dot" style="background:${item.metaColor || '#a8a29e'}"></span>${cmdParityEscape(item.meta)}</span>` : `<span data-comment="cmd-palette-result-${index}-kind" class="text-[10px] uppercase tracking-wider font-semibold text-stone-400 dark:text-stone-500 shrink-0">${cmdParityEscape(item.kind)}</span>`;
            parts.push(`
              <button type="button" data-comment="cmd-palette-result-${index}" data-href="${cmdParityEscape(item.href)}" onclick="selectCmdPaletteItem(${index})" onmouseenter="setCmdActiveIndex(${index})" class="cmd-result${active ? ' is-active' : ''}">
                <div data-comment="cmd-palette-result-${index}-body" class="flex-1 min-w-0">
                  <p data-comment="${titleKey}" class="text-sm font-medium text-stone-900 dark:text-stone-50 truncate m-0">${cmdParityHighlight(item.title, q, titleKey)}</p>
                  <p data-comment="${subtitleKey}" class="text-xs text-stone-400 dark:text-stone-500 truncate mt-0.5 m-0">${cmdParityHighlight(item.subtitle, q, subtitleKey)}</p>
                </div>
                ${tag}
              </button>`);
          });
        });
        root.innerHTML = parts.join('');
        if (window.lucide) lucide.createIcons();
      }
      function setCmdActiveIndex(index) {
        cmdParityActiveIndex = index;
        document.querySelectorAll('.cmd-result').forEach((button, i) => button.classList.toggle('is-active', i === index));
      }
      function selectCmdPaletteItem(index) {
        const item = cmdParityFlatItems[index];
        if (!item) return;
        closeCmdPalette();
        window.location.href = item.href;
      }
      function onCmdPaletteKey(event) {
        if (event.key === 'Escape') { event.preventDefault(); closeCmdPalette(); return; }
        if (!cmdParityFlatItems.length) return;
        if (event.key === 'ArrowDown') {
          event.preventDefault();
          setCmdActiveIndex(Math.min(cmdParityFlatItems.length - 1, cmdParityActiveIndex + 1));
        } else if (event.key === 'ArrowUp') {
          event.preventDefault();
          setCmdActiveIndex(Math.max(0, cmdParityActiveIndex - 1));
        } else if (event.key === 'Enter') {
          event.preventDefault();
          selectCmdPaletteItem(cmdParityActiveIndex);
        }
      }
      document.addEventListener('DOMContentLoaded', ensureCmdPaletteStructure);</script>
  
      <div id="cmd-palette" data-comment="cmd-palette" data-component="dialog" class="cmd-palette-root">
        <div class="cmd-palette-backdrop" onclick="closeCmdPalette()">
          <div class="cmd-palette-panel" data-comment="cmd-palette-panel" onclick="event.stopPropagation()">
            <div data-comment="cmd-palette-search-wrap" class="p-3 border-b border-stone-200 dark:border-stone-800 shrink-0">
              <div class="flex items-center gap-2.5 px-4 h-9 rounded-full bg-stone-100 dark:bg-stone-800 border border-transparent">
                <i data-lucide="search" class="w-4 h-4 text-stone-400 shrink-0"></i>
                <input id="cmd-palette-input" data-comment="cmd-palette-input" data-component="input" type="text" placeholder="Search jobs, tasks, todos..." class="flex-1 bg-transparent text-sm text-stone-900 dark:text-stone-50 placeholder:text-stone-400 outline-none border-0" oninput="onCmdPaletteInput(event)" onkeydown="onCmdPaletteKey(event)" />
                <kbd class="inline-flex items-center text-[10px] font-medium text-stone-400 border border-stone-300 dark:border-stone-600 rounded px-1.5 py-0.5 bg-white dark:bg-stone-700 leading-none">ESC</kbd>
              </div>
            </div>
            <div data-comment="cmd-palette-results" id="cmd-palette-results" class="flex-1 overflow-y-auto"></div>
          </div>
        </div>
      </div>

  </body>
</html>
