<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job — Countryside Concrete PM</title>

    <link rel="icon" type="image/webp" href="favicon.webp" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet" />

    <script>
      (function () {
        try {
          var t = localStorage.getItem('color-mode');
          if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
            colors: {
              brand: {
                50: 'oklch(98.5% 0 0)', 100: 'oklch(96% 0 0)', 200: 'oklch(91% 0 0)',
                300: 'oklch(83% 0 0)', 400: 'oklch(70% 0 0)', 500: 'oklch(21% 0 0)',
                600: 'oklch(16% 0 0)', 700: 'oklch(13% 0 0)', 800: 'oklch(10% 0 0)',
                900: 'oklch(8% 0 0)', 950: 'oklch(6% 0 0)'
              }
            }
          }
        }
      };
    </script>

    <style type="text/tailwindcss">
      html, body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; }
      i[data-lucide] { display: inline-block; width: 1em; height: 1em; }
      i[data-lucide]:empty { visibility: hidden; }
      .sb-backdrop { opacity: 0; pointer-events: none; transition: opacity 250ms ease; } .sb-backdrop.is-open { opacity: 1; pointer-events: auto; } .nav-link.active { background-color: oklch(21% 0 0); color: white; font-weight: 500; }
      .dark .nav-link.active { background-color: white; color: oklch(21% 0 0); }
      .tab-underline[aria-selected="true"] {
        border-bottom-color: rgb(28 25 23);
        color: rgb(28 25 23);
      }
      .dark .tab-underline[aria-selected="true"] {
        border-bottom-color: rgb(250 250 249);
        color: rgb(250 250 249);
      }
      .drawer-root, .dialog-root { position: fixed; inset: 0; z-index: 50; pointer-events: none; }
      .drawer-root.is-open, .dialog-root.is-open { pointer-events: auto; }
      .drawer-backdrop, .dialog-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.4); opacity: 0; transition: opacity 250ms ease; }
      .drawer-root.is-open .drawer-backdrop, .dialog-root.is-open .dialog-backdrop { opacity: 1; }
      .dialog-backdrop { display: flex; align-items: center; justify-content: center; padding: 1rem; }
      .drawer-panel { position: absolute; top: 0; right: 0; bottom: 0; width: 100%; max-width: 32rem; background: white; box-shadow: -10px 0 30px rgb(0 0 0 / 0.1); display: flex; flex-direction: column; transform: translateX(100%); transition: transform 280ms cubic-bezier(.32,.72,.16,1); }
      .dark .drawer-panel { background: rgb(12 10 9); }
      .drawer-root.is-open .drawer-panel { transform: translateX(0); }
      .dialog-panel { background: white; border-radius: 1.5rem; max-width: 32rem; width: 100%; padding: 1.5rem; box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25); transform: translateY(8px) scale(0.98); opacity: 0; transition: transform 200ms ease, opacity 200ms ease; }
      .dark .dialog-panel { background: rgb(12 10 9); }
      .dialog-root.is-open .dialog-panel { transform: translateY(0) scale(1); opacity: 1; }
      .vol-input {
        appearance: none; border-radius: 9999px; outline: none; border: 1px solid transparent;
        height: 2.25rem; background-color: rgb(245 245 244);
        font-size: 0.875rem; color: rgb(28 25 23);
      }
      .dark .vol-input { background-color: rgb(41 37 36); color: rgb(250 250 249); }
      .vol-input::placeholder { color: rgb(168 162 158); }
      .dark .vol-input::placeholder { color: rgb(120 113 108); }
      .vol-input:not([class*="pl-"]):not([class*="px-"]) { padding-left: 1rem; }
      .vol-input:not([class*="pr-"]):not([class*="px-"]) { padding-right: 1rem; }
      .vol-input:focus { border-color: rgb(168 162 158); box-shadow: 0 0 0 2px rgba(28,25,23,.2); }
      .dark .vol-input:focus { border-color: rgb(120 113 108); box-shadow: 0 0 0 2px rgba(245,245,244,.2); }
    
      /* Command Palette */
      .cmd-palette-root { position: fixed; inset: 0; z-index: 70; pointer-events: none; }
      .cmd-palette-root.is-open { pointer-events: auto; }
      .cmd-palette-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); opacity: 0; transition: opacity 200ms ease; display: flex; justify-content: center; padding-top: 12vh; }
      .dark .cmd-palette-backdrop { background: rgba(0,0,0,0.5); }
      .cmd-palette-root.is-open .cmd-palette-backdrop { opacity: 1; }
      .cmd-palette-panel { width: 600px; max-width: 95vw; max-height: 75vh; background: white; border: 1px solid rgb(231 229 228); border-radius: 0.75rem; box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25); overflow: hidden; display: flex; flex-direction: column; transform: translateY(-8px) scale(0.98); opacity: 0; transition: transform 200ms ease, opacity 200ms ease; }
      .dark .cmd-palette-panel { background: rgb(12 10 9); border-color: rgb(41 37 36); }
      .cmd-palette-root.is-open .cmd-palette-panel { transform: translateY(0) scale(1); opacity: 1; }
      .cmd-result { width: 100%; display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; cursor: pointer; border-bottom: 1px solid rgb(245 245 244); transition: background-color 100ms; text-align: left; background: transparent; border-left: none; border-right: none; border-top: none; }
      .dark .cmd-result { border-bottom-color: rgb(28 25 23); }
      .cmd-result:hover, .cmd-result.is-active { background-color: rgb(245 245 244); }
      .dark .cmd-result:hover, .dark .cmd-result.is-active { background-color: rgb(28 25 23); }
      .cmd-section-header { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background: rgb(250 250 249); border-bottom: 1px solid rgb(245 245 244); border-top: 1px solid rgb(245 245 244); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: rgb(168 162 158); }
      .dark .cmd-section-header { background: rgb(28 25 23); border-color: rgb(41 37 36); color: rgb(120 113 108); }
      .cmd-section-header:first-child { border-top: none; }
          /* sb-collapsed icon-only */
      @media (min-width: 1024px) {
        .sb-collapsed .nav-link, .sb-collapsed .qa-btn {
          padding: 0 !important; gap: 0 !important;
          width: 2.5rem !important; height: 2.5rem !important;
          margin-left: auto !important; margin-right: auto !important;
          justify-content: center !important;
        }
        .sb-collapsed .sidebar-label { display: none !important; }
      }
    
      .user-popover { position: absolute; bottom: calc(100% + 8px); left: 0.5rem; right: 0.5rem; z-index: 60; background: white; border: 1px solid rgb(231 229 228); border-radius: 0.75rem; box-shadow: 0 10px 30px rgb(0 0 0 / 0.12); padding: 0.25rem; opacity: 0; pointer-events: none; transform: translateY(4px); transition: opacity 150ms ease, transform 150ms ease; }
      .dark .user-popover { background: rgb(12 10 9); border-color: rgb(41 37 36); }
      .user-popover.is-open { opacity: 1; pointer-events: auto; transform: translateY(0); }
    </style>
  </head>

  <body class="font-sans antialiased">
    <div data-comment="job-shell" class="h-screen bg-stone-100 dark:bg-stone-950 overflow-hidden">

      <aside data-comment="sidebar" id="sidebar"
        class="fixed inset-y-0 left-0 bg-stone-100 dark:bg-stone-950 flex flex-col z-30 transition-[transform] lg:transition-[width] duration-150 lg:w-64 w-64 -translate-x-full lg:translate-x-0">
        <header data-comment="sidebar-brand" class="h-14 flex items-center gap-3 px-[18px] border-b border-stone-200/70 dark:border-stone-800 shrink-0 overflow-hidden">
          <img data-comment="sidebar-brand-logo" src="favicon.webp" alt="Countryside Concrete" class="w-7 h-7 rounded-md shrink-0" />
          <div data-comment="sidebar-brand-text" class="leading-tight overflow-hidden sidebar-label">
            <p data-comment="sidebar-brand-name" class="text-xs font-bold text-stone-900 dark:text-stone-50 tracking-wide whitespace-nowrap">COUNTRYSIDE</p>
            <p data-comment="sidebar-brand-sub" class="text-[10px] text-stone-400 dark:text-stone-500 tracking-widest uppercase whitespace-nowrap">Concrete</p>
          </div>
        </header>
        <nav data-comment="sidebar-nav" aria-label="Main navigation" class="flex-1 p-2 space-y-1 overflow-y-auto overflow-x-hidden">
          <p data-comment="sidebar-nav-section" class="sidebar-label px-3 pb-2 pt-1 text-[10px] font-semibold uppercase tracking-widest text-stone-400 dark:text-stone-600">Workspace</p>
          <a data-component="link" data-comment="sidebar-nav-dashboard" href="home.html" class="nav-link flex items-center gap-2.5 px-3 py-2 rounded-full text-sm transition-colors cursor-pointer text-stone-800 dark:text-stone-400 hover:text-stone-900 dark:hover:text-stone-300 hover:bg-stone-200/50 dark:hover:bg-stone-800/40">
            <i data-lucide="layout-dashboard" class="w-4 h-4 shrink-0"></i><span class="flex-1 sidebar-label">Dashboard</span>
          </a>
          <a data-component="link" data-comment="sidebar-nav-calendar" href="calendar.html" class="nav-link flex items-center gap-2.5 px-3 py-2 rounded-full text-sm transition-colors cursor-pointer text-stone-800 dark:text-stone-400 hover:text-stone-900 dark:hover:text-stone-300 hover:bg-stone-200/50 dark:hover:bg-stone-800/40">
            <i data-lucide="calendar-days" class="w-4 h-4 shrink-0"></i><span class="flex-1 sidebar-label">Calendar</span>
          </a>
          <a data-component="link" data-comment="sidebar-nav-jobs" href="jobs.html" class="nav-link active flex items-center gap-2.5 px-3 py-2 rounded-full text-sm transition-colors cursor-pointer text-stone-800 dark:text-stone-400 hover:text-stone-900 dark:hover:text-stone-300 hover:bg-stone-200/50 dark:hover:bg-stone-800/40">
            <i data-lucide="hard-hat" class="w-4 h-4 shrink-0"></i><span class="flex-1 sidebar-label">Jobs</span>
          </a>
          <a data-component="link" data-comment="sidebar-nav-todos" href="tasks.html" class="nav-link flex items-center gap-2.5 px-3 py-2 rounded-full text-sm transition-colors cursor-pointer text-stone-800 dark:text-stone-400 hover:text-stone-900 dark:hover:text-stone-300 hover:bg-stone-200/50 dark:hover:bg-stone-800/40">
            <i data-lucide="check-square" class="w-4 h-4 shrink-0"></i><span class="flex-1 sidebar-label">Todos</span>
          </a>
          <a data-component="link" data-comment="sidebar-nav-employees" href="employees.html" class="nav-link flex items-center gap-2.5 px-3 py-2 rounded-full text-sm transition-colors cursor-pointer text-stone-800 dark:text-stone-400 hover:text-stone-900 dark:hover:text-stone-300 hover:bg-stone-200/50 dark:hover:bg-stone-800/40">
            <i data-lucide="users" class="w-4 h-4 shrink-0"></i><span class="flex-1 sidebar-label">Employees</span>
          </a>
          <a data-component="link" data-comment="sidebar-nav-changelog" href="changelog.html" class="nav-link flex items-center gap-2.5 px-3 py-2 rounded-full text-sm transition-colors cursor-pointer text-stone-800 dark:text-stone-400 hover:text-stone-900 dark:hover:text-stone-300 hover:bg-stone-200/50 dark:hover:bg-stone-800/40">
            <i data-lucide="megaphone" class="w-4 h-4 shrink-0"></i><span class="flex-1 sidebar-label">Changelog</span>
          </a>
        </nav>
        <div data-comment="sidebar-quick-actions" class="p-2 border-t border-stone-200/70 dark:border-stone-800 shrink-0 space-y-1">
          <p data-comment="sidebar-quick-actions-label" class="sidebar-label px-3 pb-1 pt-0.5 text-[10px] font-semibold uppercase tracking-widest text-stone-400 dark:text-stone-600">Quick Actions</p>
          <button type="button" data-comment="sidebar-quick-create-task" data-component="button" onclick="quickCreateTask()" class="qa-btn nav-link w-full flex items-center text-sm text-stone-800 dark:text-stone-400 hover:text-stone-900 dark:hover:text-stone-300 hover:bg-stone-200/50 dark:hover:bg-stone-800/40 rounded-full transition-colors cursor-pointer gap-2.5 px-3 py-2">
            <i data-lucide="plus" class="w-4 h-4 shrink-0"></i><span class="sidebar-label flex-1 text-left">Create Task</span>
          </button>
          <button type="button" data-comment="sidebar-quick-add-user" data-component="button" onclick="quickAddUser()" class="qa-btn nav-link w-full flex items-center text-sm text-stone-800 dark:text-stone-400 hover:text-stone-900 dark:hover:text-stone-300 hover:bg-stone-200/50 dark:hover:bg-stone-800/40 rounded-full transition-colors cursor-pointer gap-2.5 px-3 py-2">
            <i data-lucide="user-plus" class="w-4 h-4 shrink-0"></i><span class="sidebar-label flex-1 text-left">Add User</span>
          </button>
        </div>
        <footer data-comment="sidebar-user" class="relative p-2 border-t border-stone-200/70 dark:border-stone-800 shrink-0">
          <button type="button" data-comment="sidebar-user-button" data-component="button" aria-label="User settings" onclick="toggleUserPopover(event)"
            class="w-full flex items-center gap-2.5 px-2 py-1.5 rounded-lg hover:bg-stone-200/50 dark:hover:bg-stone-800/40 transition-colors cursor-pointer overflow-hidden">
            <div class="relative shrink-0">
              <span data-comment="sidebar-user-avatar" data-component="avatar" class="inline-flex items-center justify-center relative overflow-hidden w-9 h-9 rounded-full bg-stone-200 dark:bg-stone-700 text-stone-700 dark:text-stone-300 text-sm font-medium select-none">NK</span>
              <span data-comment="sidebar-user-status" aria-label="Live updates connected" class="absolute bottom-0 right-0 w-2 h-2 rounded-full border-2 border-stone-100 dark:border-stone-950 bg-green-400"></span>
            </div>
            <div class="sidebar-label flex-1 min-w-0 text-left">
              <p data-comment="sidebar-user-name" class="text-xs font-semibold text-stone-900 dark:text-stone-50 truncate">Nazar K.</p>
              <p data-comment="sidebar-user-role" class="text-[10px] text-stone-400 dark:text-stone-500 truncate">Super Admin</p>
            </div>
            <i data-lucide="chevrons-up-down" class="sidebar-label w-3.5 h-3.5 text-stone-400 shrink-0"></i>
          </button>
        
          <div data-comment="sidebar-user-popover" data-component="popover" id="user-popover" class="user-popover">
            <div class="px-3 py-2 mb-1 border-b border-stone-100 dark:border-stone-800">
              <p data-comment="sidebar-user-popover-name" class="text-xs font-semibold text-stone-900 dark:text-stone-50 truncate">Nazar K.</p>
              <p data-comment="sidebar-user-popover-email" class="text-[10px] text-stone-400 truncate">nazar@rivnetech.com</p>
            </div>
            <button type="button" data-comment="sidebar-user-popover-signout" data-component="button" onclick="signOut()"
              class="w-full flex items-center gap-2.5 px-2 py-1.5 rounded-md text-sm text-stone-700 dark:text-stone-300 hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors cursor-pointer">
              <i data-lucide="log-out" class="w-4 h-4 text-stone-400"></i>Sign out
            </button>
          </div>
        </footer>
      </aside>

      <div data-comment="sidebar-mobile-backdrop" id="sidebar-backdrop" class="sb-backdrop fixed inset-0 bg-black/40 z-20 lg:hidden" onclick="closeMobileSidebar()"></div>

      <div id="task-drawer" data-comment="task-drawer" data-component="drawer" class="drawer-root">
        <div class="drawer-backdrop" onclick="closeTaskDrawer()"></div>
        <aside class="drawer-panel" data-comment="task-drawer-panel">
          <header class="flex items-center justify-between px-6 py-4 border-b border-stone-200 dark:border-stone-800 shrink-0">
            <div>
              <p data-comment="task-drawer-id" id="task-drawer-id" class="text-[10px] font-medium uppercase tracking-wider text-stone-400 dark:text-stone-500">TASK #—</p>
              <h2 data-comment="task-drawer-title" id="task-drawer-title" class="text-lg font-semibold text-stone-900 dark:text-stone-50 mt-0.5">—</h2>
            </div>
            <button type="button" data-comment="task-drawer-close" aria-label="Close" onclick="closeTaskDrawer()"
              class="w-8 h-8 flex items-center justify-center rounded-lg text-stone-400 hover:text-stone-700 dark:hover:text-stone-200 hover:bg-stone-100 dark:hover:bg-stone-800 cursor-pointer">
              <i data-lucide="x" class="w-4 h-4"></i>
            </button>
          </header>
          <div data-comment="task-drawer-body" id="task-drawer-body" class="flex-1 overflow-y-auto p-6 flex flex-col gap-5"></div>
        </aside>
      </div>

      <div id="todo-create-dialog" data-comment="todo-create-dialog" data-component="dialog" class="dialog-root">
        <div class="dialog-backdrop" onclick="closeTodoCreate()">
          <div class="dialog-panel" onclick="event.stopPropagation()">
            <div class="flex items-start justify-between mb-5">
              <div>
                <h2 class="text-lg font-semibold text-stone-900 dark:text-stone-50" data-comment="todo-create-title">Create Todo</h2>
                <p class="text-xs text-stone-500 dark:text-stone-400 mt-0.5" data-comment="todo-create-job-context" id="todo-create-job-context">For job —</p>
              </div>
              <button type="button" data-comment="todo-create-close" aria-label="Close" onclick="closeTodoCreate()"
                class="w-8 h-8 flex items-center justify-center rounded-lg text-stone-400 hover:text-stone-700 dark:hover:text-stone-200 hover:bg-stone-100 dark:hover:bg-stone-800 cursor-pointer">
                <i data-lucide="x" class="w-4 h-4"></i>
              </button>
            </div>
            <div data-comment="todo-create-form" data-component="form" class="flex flex-col gap-4">
              <div class="flex flex-col gap-1.5">
                <label class="text-sm font-medium text-stone-700 dark:text-stone-300" data-comment="todo-create-label-title">Title</label>
                <input id="todo-create-title-input" data-comment="todo-create-input-title" data-component="input" type="text" class="vol-input w-full" placeholder="What needs doing?" />
              </div>
              <div data-comment="todo-create-error" id="todo-create-error" class="hidden text-xs text-red-500"></div>
              <div class="flex justify-end gap-2 pt-2">

                <button type="button" data-comment="todo-create-submit" data-component="button" onclick="submitTodoCreate()"

                  <i data-lucide="plus" class="w-4 h-4"></i>Create
                </button>
              </div>
            </div>
          </div>
        </div>

              </button>

              </nav>
            </div>
            <div data-comment="header-actions" role="toolbar" aria-label="Header actions" class="flex items-center gap-2">

                <i data-lucide="moon" class="w-4 h-4 dark:hidden"></i>
                <i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i>
              </button>
            </div>
          </header>

          <main data-comment="main" class="flex-1 overflow-hidden flex flex-col">
            <div data-comment="job-page" class="flex flex-col h-full overflow-hidden">

              <div data-comment="job-header" id="job-header" class="px-6 pt-6 pb-5 shrink-0"></div>
              <div data-comment="job-tabs" id="job-tabs" class="px-6 shrink-0"></div>
              <div data-comment="job-tab-panel" id="job-tab-panel" class="flex-1 overflow-auto px-6 py-5"></div>
            </div>
          </main>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
    <script>
      function createStore(initialState) {
        let state = structuredClone(initialState);
        const listeners = new Set();
        return {
          get: () => state,
          set(updater) {
            const patch = typeof updater === 'function' ? updater(state) : updater;
            state = { ...state, ...patch };
            listeners.forEach((fn) => fn(state));
          },
          subscribe(fn) { listeners.add(fn); return () => listeners.delete(fn); }
        };
      }

      const JOB_STATUSES = [
        { value: 'Tentative',  label: 'Tentative',  dotCls: 'bg-amber-600 dark:bg-amber-400',   textCls: 'text-amber-600 dark:text-amber-400' },
        { value: 'In Process', label: 'In Process', dotCls: 'bg-blue-600 dark:bg-blue-400',     textCls: 'text-blue-600 dark:text-blue-400' },
        { value: 'Confirmed',  label: 'Confirmed',  dotCls: 'bg-emerald-600 dark:bg-emerald-400', textCls: 'text-emerald-600 dark:text-emerald-400' },
        { value: 'Closed',     label: 'Closed',     dotCls: 'bg-stone-500 dark:bg-stone-400',   textCls: 'text-stone-500 dark:text-stone-400' }
      ];
      const jobStatus = (v) => JOB_STATUSES.find((s) => s.value === v) ?? JOB_STATUSES[3];

      const TASK_TYPES = [
        { value: 'Forming',    label: 'Forming',    color: '#3b82f6' },
        { value: 'Flatwork',   label: 'Flatwork',   color: '#10b981' },
        { value: 'Excavating', label: 'Excavating', color: '#f59e0b' }
      ];
      const taskType = (v) => TASK_TYPES.find((t) => t.value === v) ?? { value: v, label: v, color: '#a8a29e' };

      const TODO_TYPES = [
        { id: 1, label: 'General',      icon: 'circle-dot',       color: '#a8a29e' },
        { id: 2, label: 'Change Order', icon: 'git-pull-request', color: '#f97316' },
        { id: 3, label: 'Safety',       icon: 'shield-alert',     color: '#ef4444' },
        { id: 4, label: 'Financial',    icon: 'dollar-sign',      color: '#22c55e' },
        { id: 5, label: 'Other',        icon: 'ellipsis',         color: '#8b5cf6' }
      ];
      const TODO_STATUSES = [
        { id: 1, label: 'Not Started', color: '#a8a29e' },
        { id: 2, label: 'In Progress', color: '#3b82f6' },
        { id: 3, label: 'Review',      color: '#f97316' },
        { id: 4, label: 'Done',        color: '#22c55e' },
        { id: 5, label: 'Blocked',     color: '#ef4444' }
      ];
      const TODO_PRIORITIES = [
        { value: 'low',    label: 'Low',    color: '#a8a29e', icon: 'arrow-down' },
        { value: 'medium', label: 'Medium', color: '#3b82f6', icon: 'arrow-right' },
        { value: 'high',   label: 'High',   color: '#f97316', icon: 'arrow-up' },
        { value: 'urgent', label: 'Urgent', color: '#ef4444', icon: 'flame' }
      ];
      const todoType     = (id) => TODO_TYPES.find((t) => t.id === id) ?? TODO_TYPES[4];
      const todoStatus   = (id) => TODO_STATUSES.find((s) => s.id === id) ?? TODO_STATUSES[0];
      const todoPriority = (v)  => TODO_PRIORITIES.find((p) => p.value === v) ?? TODO_PRIORITIES[0];

      const USERS = [
        { id: 1, first_name: 'Nazar',  last_name: 'K.',     color: '#3b82f6', is_foreman: true  },
        { id: 2, first_name: 'Anna',   last_name: 'Lee',    color: '#22c55e', is_foreman: false },
        { id: 3, first_name: 'Mark',   last_name: 'Chen',   color: '#f97316', is_foreman: true  },
        { id: 4, first_name: 'Olivia', last_name: 'Brown',  color: '#a855f7', is_foreman: false },
        { id: 5, first_name: 'Liam',   last_name: 'Patel',  color: '#ef4444', is_foreman: false }
      ];
      const displayName = (u) => `${u.first_name} ${u.last_name}`;
      const initials = (n) => n.split(' ').map((p) => p[0]).slice(0, 2).join('').toUpperCase();
      const isForeman = (u) => !!u.is_foreman;

      function isoOffset(d) { return new Date(Date.now() + d * 86400000).toISOString().slice(0, 10); }
      const parseISO = (iso) => new Date(iso + 'T00:00:00');
      const formatShortDate = (iso) => iso ? new Date(iso + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';

      const JOB = {
        job_id: 1042,
        descr: 'Westbrook commercial complex — north wing foundation',
        status: 'In Process',
        customerid: 'C001',
        customer_name: 'Westbrook Holdings',
        l_address1: '125 Industrial Pkwy',
        l_city: 'Toronto',
        l_state: 'ON',
        begin_date: isoOffset(-12),
        end_date: isoOffset(28),
        tot_hours: 540,
        note: 'Owner requires sequenced pour with 24-hour cure between sections. Coordinate with electrician on conduit pickups before each pour.',
        tasks: [
          { autoid: 1,  descr: 'Excavate basement footprint',     type: 'Excavating', start_date: isoOffset(-12), end_date: isoOffset(-9),  assigned_users: [USERS[2], USERS[4]] },
          { autoid: 2,  descr: 'Form footings — east elevation',  type: 'Forming',    start_date: isoOffset(-8),  end_date: isoOffset(-5),  assigned_users: [USERS[0], USERS[1]] },
          { autoid: 3,  descr: 'Pour foundation slab — north wing', type: 'Flatwork', start_date: isoOffset(-4),  end_date: isoOffset(-2), assigned_users: [USERS[0], USERS[1], USERS[3]] },
          { autoid: 4,  descr: 'Form wall sections A1–A4',        type: 'Forming',    start_date: isoOffset(-1),  end_date: isoOffset(3),   assigned_users: [USERS[2], USERS[1]] },
          { autoid: 5,  descr: 'Strip forms section A',           type: 'Forming',    start_date: isoOffset(4),   end_date: isoOffset(5),   assigned_users: [USERS[2]] },
          { autoid: 6,  descr: 'Pour interior columns batch 1',   type: 'Flatwork',   start_date: isoOffset(7),   end_date: isoOffset(9),   assigned_users: [USERS[0], USERS[3], USERS[4]] }
        ],
        todos: [
          { id: 1, title: 'Submit RFI for column spacing on north elevation', type: { id: 2 }, status: { id: 2 }, priority: 'high',   due_date: isoOffset(3),  assigned_users: [USERS[1], USERS[2]] },
          { id: 3, title: 'Coordinate with electrician on conduit layout',   type: { id: 1 }, status: { id: 3 }, priority: 'low',    due_date: isoOffset(7),  assigned_users: [USERS[3]] },
          { id: 5, title: 'Update budget after change order #4',              type: { id: 4 }, status: { id: 4 }, priority: 'medium', due_date: isoOffset(-2), assigned_users: [USERS[1]] },
          { id: 7, title: 'Final walkthrough with owner — punch list',        type: { id: 1 }, status: { id: 3 }, priority: 'medium', due_date: isoOffset(20), assigned_users: [USERS[3], USERS[0]] }
        ]
      };

      const store = createStore({
        job: JOB,
        activeTab: 'tasks',
        taskDrawerId: null,
        todoCreateOpen: false,
        sidebarCollapsed: false,
        sidebarMobileOpen: false
      });

      function el(tag, attrs = {}, children = []) {
        const node = document.createElement(tag);
        for (const [k, v] of Object.entries(attrs)) {
          if (v == null || v === false) continue;
          if (k === 'class') node.className = v;
          else if (k === 'style') node.setAttribute('style', v);
          else if (k.startsWith('on') && typeof v === 'function') node[k] = v;
          else node.setAttribute(k, v === true ? '' : v);
        }
        for (const c of [].concat(children)) {
          if (c == null || c === false) continue;
          node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
        }
        return node;
      }
      const lucideEl = (name, cls, extra = {}) => el('i', { 'data-lucide': name, class: cls, ...extra });
      const clear = (n) => { while (n.firstChild) n.removeChild(n.firstChild); };

      function avatar(name, color, size, extraCls = '') {
        const sizes = { xs: 'w-5 h-5 text-[10px]', sm: 'w-6 h-6 text-[10px]', md: 'w-7 h-7 text-xs' };
        const cls = `inline-flex items-center justify-center relative overflow-hidden rounded-full font-medium select-none shrink-0 ${sizes[size] || sizes.sm} ${extraCls}`;
        const style = color ? `background:${color}22;color:${color}` : '';
        return el('span', { class: cls, style, title: name }, initials(name));
      }

      function metaCard(icon, label, value, link) {
        const Tag = link ? 'a' : 'div';
        const attrs = {
          'data-comment': `meta-${label.toLowerCase().replace(/\s+/g, '-')}`,
          class: 'flex items-center gap-3 px-4 py-3 rounded-xl bg-stone-50 dark:bg-stone-800/50 border border-stone-200 dark:border-stone-700 min-w-36' + (link ? ' hover:border-stone-300 dark:hover:border-stone-600 hover:bg-stone-100 dark:hover:bg-stone-800/70 transition-colors group no-underline' : '')
        };
        if (link) { attrs.href = link; attrs.target = '_blank'; attrs.rel = 'noopener noreferrer'; }
        const root = el(Tag, attrs);
        const ico = el('div', { class: 'w-8 h-8 rounded-lg bg-stone-200/70 dark:bg-stone-700 flex items-center justify-center shrink-0' });
        ico.appendChild(lucideEl(icon, 'w-4 h-4 text-stone-500 dark:text-stone-300'));
        root.appendChild(ico);
        const inner = el('div');
        const labelEl = el('p', { class: 'text-xs text-stone-400 dark:text-stone-500 m-0 flex items-center gap-1' }, label);
        if (link) labelEl.appendChild(lucideEl('external-link', 'w-3 h-3'));
        inner.appendChild(labelEl);
        inner.appendChild(el('p', { class: 'text-sm font-medium text-stone-800 dark:text-stone-200 mt-0.5 m-0 whitespace-nowrap' }, value));
        root.appendChild(inner);
        return root;
      }

      function renderHeader() {
        const { job } = store.get();
        const root = document.getElementById('job-header');
        clear(root);
        document.getElementById('breadcrumb-current').textContent = job.descr;
        document.title = `#${job.job_id} ${job.descr} — Countryside Concrete PM`;

        const titleRow = el('div', { class: 'flex items-start justify-between gap-4' });
        titleRow.appendChild(el('h1', {
          'data-comment': 'job-title',
          class: 'text-2xl font-bold text-stone-900 dark:text-stone-50 leading-tight m-0'
        }, job.descr));
        const addBtn = el('button', {
          type: 'button',
          'data-comment': 'job-add-todo',
          'data-component': 'button',
          onclick: () => openTodoCreate(),
          class: 'shrink-0 inline-flex items-center justify-center h-9 px-4 gap-1.5 rounded-full text-sm bg-brand-500 hover:bg-brand-600 active:bg-brand-700 text-white border border-brand-500 dark:bg-white dark:text-stone-900 dark:border-white dark:hover:bg-stone-100 cursor-pointer'
        });
        addBtn.appendChild(lucideEl('plus', 'w-4 h-4'));
        addBtn.appendChild(document.createTextNode('Add Todo'));
        titleRow.appendChild(addBtn);
        root.appendChild(titleRow);

        const idRow = el('div', { class: 'mt-1 flex items-center gap-2' });
        idRow.appendChild(el('span', { 'data-comment': 'job-id', class: 'text-sm font-mono text-stone-400 dark:text-stone-500' }, `#${job.job_id}`));
        if (job.customerid) {
          idRow.appendChild(el('span', { class: 'text-stone-300 dark:text-stone-700' }, '·'));
          const cust = el('span', { 'data-comment': 'job-customer', class: 'flex items-center gap-1 text-sm text-stone-400 dark:text-stone-500' });
          cust.appendChild(lucideEl('building-2', 'w-3.5 h-3.5 shrink-0'));
          cust.appendChild(document.createTextNode(job.customerid + (job.customer_name ? ` · ${job.customer_name}` : '')));
          idRow.appendChild(cust);
        }
        root.appendChild(idRow);

        const stRow = el('div', { class: 'mt-2.5' });
        const st = jobStatus(job.status);
        const stTag = el('span', {
          'data-comment': 'job-status',
          class: `inline-flex items-center justify-center text-xs font-medium px-2 py-0.5 rounded-full gap-1 border border-current ${st.textCls}`
        });
        stTag.appendChild(el('span', { class: `w-1.5 h-1.5 rounded-full shrink-0 ${st.dotCls}` }));
        stTag.appendChild(document.createTextNode(st.label));
        stRow.appendChild(stTag);
        root.appendChild(stRow);

        const meta = el('div', { 'data-comment': 'job-meta', class: 'mt-5 flex flex-wrap gap-5' });
        meta.appendChild(metaCard('calendar',       'Start Date',   formatShortDate(job.begin_date)));
        meta.appendChild(metaCard('calendar-check', 'End Date',     formatShortDate(job.end_date)));
        meta.appendChild(metaCard('clock',          'Total Hours',  job.tot_hours ? `${job.tot_hours} hours` : '—'));
        if (job.l_address1 || job.l_city) {
          const addr = [job.l_address1, job.l_city, job.l_state].filter(Boolean).join(', ');
          const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(addr)}`;
          meta.appendChild(metaCard('map-pin', 'Address', addr, url));
        }
        root.appendChild(meta);

        if (job.note) {
          const noteWrap = el('div', {
            'data-comment': 'job-note',
            class: 'mt-5 rounded-xl bg-stone-50 dark:bg-stone-800/50 border border-stone-200 dark:border-stone-700 px-4 py-3'
          });
          noteWrap.appendChild(el('p', { class: 'text-xs text-stone-400 dark:text-stone-500 mb-1 m-0' }, 'Notes'));
          noteWrap.appendChild(el('p', { 'data-comment': 'job-note-text', class: 'text-sm text-stone-700 dark:text-stone-300 leading-relaxed m-0' }, job.note));
          root.appendChild(noteWrap);
        }
      }

      function renderTabs() {
        const { activeTab, job } = store.get();
        const root = document.getElementById('job-tabs');
        clear(root);
        const list = el('div', { 'data-component': 'tabs', role: 'tablist', class: 'flex items-center border-b border-stone-200 dark:border-stone-800 gap-0' });
        const mk = (value, label, icon, count) => {
          const active = value === activeTab;
          const btn = el('button', {
            type: 'button',
            role: 'tab',
            'data-comment': `job-tab-${value}`,
            'aria-selected': String(active),
            onclick: () => store.set({ activeTab: value }),
            class: `tab-underline px-3.5 py-2 -mb-px text-sm font-medium cursor-pointer select-none whitespace-nowrap outline-none border-b-2 border-transparent text-stone-500 dark:text-stone-400 hover:text-stone-700 dark:hover:text-stone-300 transition-colors duration-100`
          });
          const inner = el('span', { class: 'flex items-center gap-1.5' });
          inner.appendChild(lucideEl(icon, 'w-3.5 h-3.5'));
          inner.appendChild(document.createTextNode(label));
          if (count) {
            inner.appendChild(el('span', {
              'data-component': 'badge',
              class: 'min-w-4 h-4 leading-4 px-1 bg-stone-900 dark:bg-white text-white dark:text-stone-900 rounded-full text-[10px] font-bold flex items-center justify-center'
            }, String(count)));
          }
          btn.appendChild(inner);
          return btn;
        };
        list.appendChild(mk('tasks', 'Tasks', 'hammer', job.tasks.length));
        list.appendChild(mk('todos', 'Todos', 'check-square', job.todos.length));
        root.appendChild(list);
      }

      function renderTaskRow(task, idx) {
        const tt = taskType(task.type);
        const root = el('div', {
          'data-comment': `job-task-${task.autoid}`,
          tabindex: '0', role: 'button',
          class: 'flex items-start gap-3 p-3 rounded-lg border border-stone-200 dark:border-stone-800 bg-white dark:bg-stone-800/30 hover:border-stone-300 dark:hover:border-stone-700 transition-colors cursor-pointer',
          onclick: () => openTaskDrawer(task.autoid)
        });
        const main = el('div', { class: 'flex-1 min-w-0' });
        const titleRow = el('div', { class: 'flex items-center gap-2 flex-wrap' });
        const foreman = task.assigned_users.find(isForeman);
        if (foreman) titleRow.appendChild(avatar(displayName(foreman), foreman.color, 'xs'));
        titleRow.appendChild(el('p', { 'data-comment': `job-task-${task.autoid}-descr`, class: 'text-sm font-medium text-stone-800 dark:text-stone-200 leading-snug m-0' }, task.descr));
        const tag = el('span', {
          'data-comment': `job-task-${task.autoid}-type`,
          class: 'inline-flex items-center justify-center text-xs font-medium px-2 py-0.5 rounded-full gap-1 border',
          style: `border-color:${tt.color}66;background:${tt.color}1a;color:${tt.color}`
        });
        tag.appendChild(el('span', { class: 'w-1.5 h-1.5 rounded-full shrink-0', style: 'background:currentColor' }));
        tag.appendChild(document.createTextNode(tt.label));
        titleRow.appendChild(tag);
        main.appendChild(titleRow);

        if (task.start_date || task.end_date) {
          const dates = el('div', { class: 'mt-1.5 flex items-center gap-1 text-xs text-stone-400 dark:text-stone-500' });
          dates.appendChild(lucideEl('calendar', 'w-3 h-3 shrink-0'));
          dates.appendChild(document.createTextNode(formatShortDate(task.start_date)));
          dates.appendChild(lucideEl('arrow-right', 'w-3 h-3 shrink-0'));
          dates.appendChild(document.createTextNode(formatShortDate(task.end_date)));
          main.appendChild(dates);
        }
        root.appendChild(main);

        if (task.assigned_users && task.assigned_users.length) {
          const av = el('div', { 'data-comment': `job-task-${task.autoid}-assignees`, class: 'flex items-center gap-1 shrink-0 self-center' });
          task.assigned_users.slice(0, 4).forEach((u) => av.appendChild(avatar(displayName(u), u.color, 'xs')));
          if (task.assigned_users.length > 4) {
            av.appendChild(el('span', {
              class: 'flex items-center justify-center w-5 h-5 rounded-full text-[9px] font-semibold bg-stone-200 dark:bg-stone-700 text-stone-500 dark:text-stone-300'
            }, `+${task.assigned_users.length - 4}`));
          }
          root.appendChild(av);
        }

        const calBtn = el('button', {
          type: 'button',
          'data-comment': `job-task-${task.autoid}-calendar`,
          'aria-label': 'Show on Calendar',
          onclick: (e) => { e.stopPropagation(); window.open(`calendar.html#task-${task.autoid}`, '_blank'); },
          class: 'w-7 h-7 flex items-center justify-center rounded-md text-stone-400 hover:bg-stone-100 dark:hover:bg-stone-700 hover:text-stone-600 dark:hover:text-stone-300 transition-colors shrink-0 self-center cursor-pointer'
        });
        calBtn.appendChild(lucideEl('calendar-search', 'w-4 h-4'));
        root.appendChild(calBtn);
        return root;
      }

      function renderTodoRow(todo) {
        const tt = todoType(todo.type.id);
        const ts = todoStatus(todo.status.id);
        const tp = todoPriority(todo.priority);
        const root = el('div', {
          'data-comment': `job-todo-${todo.id}`,
          tabindex: '0', role: 'button',
          class: 'flex items-start gap-3 p-3 rounded-lg border border-stone-200 dark:border-stone-800 bg-white dark:bg-stone-800/30 hover:border-stone-300 dark:hover:border-stone-700 transition-colors cursor-pointer',
          onclick: () => { window.location.href = `tasks.html#todo-${todo.id}`; }
        });

        root.appendChild(el('span', {
          class: 'mt-1 w-2.5 h-2.5 rounded-full shrink-0',
          style: `background:${ts.color}`
        }));

        const main = el('div', { class: 'flex-1 min-w-0' });
        main.appendChild(el('p', {
          'data-comment': `job-todo-${todo.id}-title`,
          class: 'text-sm font-medium text-stone-800 dark:text-stone-200 leading-snug m-0'
        }, todo.title));

        const meta = el('div', { class: 'mt-1 flex items-center gap-2 flex-wrap' });
        const typePill = el('div', {
          class: 'inline-flex items-center gap-1 text-xs rounded px-1.5 py-0.5',
          style: `color:${tt.color};background:${tt.color}18`
        });
        typePill.appendChild(lucideEl(tt.icon, 'w-3 h-3 shrink-0'));
        typePill.appendChild(document.createTextNode(tt.label));
        meta.appendChild(typePill);

        const prio = el('div', { class: 'inline-flex items-center gap-1 text-xs text-stone-400 dark:text-stone-500' });
        prio.appendChild(lucideEl(tp.icon, 'w-3 h-3 shrink-0', { style: `color:${tp.color}` }));
        prio.appendChild(document.createTextNode(tp.label));
        meta.appendChild(prio);

        if (todo.due_date) meta.appendChild(el('span', { class: 'text-xs text-stone-400 dark:text-stone-500' }, formatShortDate(todo.due_date)));
        main.appendChild(meta);
        root.appendChild(main);

        const right = el('div', { class: 'flex items-center gap-2 shrink-0' });
        if (todo.assigned_users && todo.assigned_users.length) {
          const stack = el('div', { class: 'flex items-center' });
          todo.assigned_users.slice(0, 3).forEach((u, i) => stack.appendChild(avatar(displayName(u), u.color, 'xs', i > 0 ? '-ml-1 relative' : '')));
          right.appendChild(stack);
        }
        const stTag = el('span', {
          'data-comment': `job-todo-${todo.id}-status`,
          class: 'inline-flex items-center justify-center text-xs font-medium px-2 py-0.5 rounded-full gap-1 border border-stone-300 dark:border-stone-600 text-stone-700 dark:text-stone-300'
        });
        stTag.appendChild(el('span', { class: 'w-1.5 h-1.5 rounded-full shrink-0', style: `background:${ts.color}` }));
        stTag.appendChild(document.createTextNode(ts.label));
        right.appendChild(stTag);
        root.appendChild(right);

        return root;
      }

      function renderEmpty(icon, title, description) {
        const wrap = el('div', { class: 'flex flex-col items-center justify-center gap-3 py-12 text-center' });
        const ico = el('div', { class: 'w-10 h-10 rounded-3xl bg-stone-50 dark:bg-stone-800 flex items-center justify-center' });
        ico.appendChild(lucideEl(icon, 'w-8 h-8 text-stone-400 dark:text-stone-500'));
        wrap.appendChild(ico);
        const inner = el('div');
        inner.appendChild(el('p', { class: 'text-sm font-semibold text-stone-900 dark:text-stone-50 m-0' }, title));
        inner.appendChild(el('p', { class: 'text-xs text-stone-400 dark:text-stone-500 mt-0.5 m-0' }, description));
        wrap.appendChild(inner);
        return wrap;
      }

      function renderTabPanel() {
        const { activeTab, job } = store.get();
        const root = document.getElementById('job-tab-panel');
        clear(root);
        if (activeTab === 'tasks') {
          if (!job.tasks.length) {
            root.appendChild(renderEmpty('hammer', 'No tasks', 'This job has no tasks yet'));
          } else {
            const list = el('div', { 'data-comment': 'job-tasks-list', class: 'flex flex-col gap-2' });
            job.tasks.forEach((t, i) => list.appendChild(renderTaskRow(t, i)));
            root.appendChild(list);
          }
        } else {
          if (!job.todos.length) {
            root.appendChild(renderEmpty('check-square', 'No todos', 'This job has no todos yet'));
          } else {
            const list = el('div', { 'data-comment': 'job-todos-list', class: 'flex flex-col gap-2' });
            job.todos.forEach((t) => list.appendChild(renderTodoRow(t)));
            root.appendChild(list);
          }
        }
      }

      function renderTaskDrawer() {
        const { job, taskDrawerId } = store.get();
        const drawer = document.getElementById('task-drawer');
        if (taskDrawerId == null) { drawer.classList.remove('is-open'); return; }
        drawer.classList.add('is-open');
        const task = job.tasks.find((t) => t.autoid === taskDrawerId);
        if (!task) return;
        const tt = taskType(task.type);
        document.getElementById('task-drawer-id').textContent = `TASK #${task.autoid}`;
        document.getElementById('task-drawer-title').textContent = task.descr;
        const body = document.getElementById('task-drawer-body');
        clear(body);

        const make = (label, content) => {
          const w = el('div', { class: 'flex flex-col gap-1' });
          w.appendChild(el('span', { class: 'text-[10px] font-medium uppercase tracking-wider text-stone-400 dark:text-stone-500' }, label));
          w.appendChild(content);
          return w;
        };

        const grid = el('div', { class: 'grid grid-cols-2 gap-4' });
        const typeP = el('span', {
          'data-comment': 'task-drawer-type',
          class: 'inline-flex items-center gap-1.5 text-xs font-medium px-2.5 py-1 rounded-full border w-fit',
          style: `border-color:${tt.color}66;background:${tt.color}1a;color:${tt.color}`
        });
        typeP.appendChild(el('span', { class: 'w-1.5 h-1.5 rounded-full shrink-0', style: 'background:currentColor' }));
        typeP.appendChild(document.createTextNode(tt.label));
        grid.appendChild(make('Type', typeP));

        const startWrap = el('div', { class: 'text-sm text-stone-700 dark:text-stone-300 tabular-nums' }, formatShortDate(task.start_date));
        grid.appendChild(make('Start date', startWrap));
        const endWrap = el('div', { class: 'text-sm text-stone-700 dark:text-stone-300 tabular-nums' }, formatShortDate(task.end_date));
        grid.appendChild(make('End date', endWrap));
        body.appendChild(grid);

        // Crew metrics card (Total Duration / Hours per Day / Hours per Person)
        const days = task.start_date && task.end_date
          ? Math.max(1, Math.round((parseISO(task.end_date) - parseISO(task.start_date)) / 86400000) + 1) : 0;
        const estHours = task.estimated_hours || (days * 8);
        const crewSize = task.assigned_users.length || 1;
        const metrics = el('div', {
          'data-comment': 'task-drawer-metrics',
          class: 'grid grid-cols-3 gap-3 rounded-xl bg-stone-50 dark:bg-stone-800/50 border border-stone-200 dark:border-stone-700 p-3'
        });
        const metric = (label, value) => {
          const w = el('div', { class: 'flex flex-col gap-0.5' });
          w.appendChild(el('span', { class: 'text-[10px] font-medium uppercase tracking-wider text-stone-400 dark:text-stone-500' }, label));
          w.appendChild(el('span', { class: 'text-sm font-semibold text-stone-900 dark:text-stone-50 tabular-nums' }, value));
          return w;
        };
        metrics.appendChild(metric('Total Duration', `${estHours} h`));
        metrics.appendChild(metric('Hours / Day', days ? (estHours / days).toFixed(1) : '—'));
        metrics.appendChild(metric('Hours / Person', `${(estHours / crewSize).toFixed(1)} h`));
        body.appendChild(metrics);

        const assignees = el('div', { 'data-comment': 'task-drawer-assignees', class: 'flex flex-col gap-1.5' });
        const foreman = task.assigned_users.find(isForeman);
        if (foreman) {
          const fwrap = el('div', { class: 'flex items-center gap-2 px-2 py-1.5 rounded-lg bg-stone-100 dark:bg-stone-800' });
          fwrap.appendChild(avatar(displayName(foreman), foreman.color, 'sm'));
          fwrap.appendChild(el('span', { class: 'text-sm text-stone-800 dark:text-stone-200 flex-1' }, displayName(foreman)));
          fwrap.appendChild(el('span', { class: 'text-[10px] font-semibold uppercase tracking-wider px-1.5 py-0.5 rounded bg-amber-100 dark:bg-amber-500/15 text-amber-700 dark:text-amber-300' }, 'Foreman'));
          assignees.appendChild(fwrap);
        }
        task.assigned_users.filter((u) => !u.is_foreman).forEach((u) => {
          const row = el('div', { class: 'flex items-center gap-2 px-2 py-1.5 rounded-lg hover:bg-stone-50 dark:hover:bg-stone-800/40' });
          row.appendChild(avatar(displayName(u), u.color, 'sm'));
          row.appendChild(el('span', { class: 'text-sm text-stone-800 dark:text-stone-200' }, displayName(u)));
          assignees.appendChild(row);
        });
        body.appendChild(make('Assigned crew', assignees));

        const calBtn = el('a', {
          'data-comment': 'task-drawer-calendar-link',
          href: `calendar.html#task-${task.autoid}`,
          target: '_blank',
          class: 'inline-flex items-center gap-1.5 text-sm text-brand-500 dark:text-brand-400 hover:underline w-fit'
        });
        calBtn.appendChild(lucideEl('calendar-search', 'w-3.5 h-3.5'));
        calBtn.appendChild(document.createTextNode('Show on Calendar'));
        body.appendChild(calBtn);

        if (window.lucide) lucide.createIcons();
      }

      function renderTodoCreate() {
        const { todoCreateOpen, job } = store.get();
        document.getElementById('todo-create-dialog').classList.toggle('is-open', !!todoCreateOpen);
        if (todoCreateOpen) {
          document.getElementById('todo-create-job-context').textContent = `For job #${job.job_id} · ${job.descr}`;
          setTimeout(() => document.getElementById('todo-create-title-input')?.focus(), 50);
        }
      }

      function openTaskDrawer(id) { store.set({ taskDrawerId: id }); }
      function closeTaskDrawer() { store.set({ taskDrawerId: null }); }
      function openTodoCreate() { store.set({ todoCreateOpen: true }); }
      function closeTodoCreate() {
        store.set({ todoCreateOpen: false });
        document.getElementById('todo-create-title-input').value = '';
        document.getElementById('todo-create-error').classList.add('hidden');
      }
      function submitTodoCreate() {
        const inp = document.getElementById('todo-create-title-input');
        const errEl = document.getElementById('todo-create-error');
        const title = inp.value.trim();
        if (!title) {
          errEl.textContent = 'Title is required';
          errEl.classList.remove('hidden');
          inp.focus();
          return;
        }
        const me = USERS[0];
        const newTodo = {
          id: Date.now(),
          title,
          type: { id: 1 },
          status: { id: 1 },
          priority: 'medium',
          due_date: null,
          assigned_users: [me]
        };
        store.set((s) => ({ job: { ...s.job, todos: [newTodo, ...s.job.todos] }, activeTab: 'todos' }));
        closeTodoCreate();
      }

      function toggleSidebar() {
        const isLg = window.matchMedia('(min-width: 1024px)').matches;
        if (isLg) store.set((s) => ({ sidebarCollapsed: !s.sidebarCollapsed }));
        else store.set((s) => ({ sidebarMobileOpen: !s.sidebarMobileOpen }));
      }
      function closeMobileSidebar() { store.set({ sidebarMobileOpen: false }); }
      function applySidebarState() {
        const { sidebarCollapsed, sidebarMobileOpen } = store.get();
        const sb = document.getElementById('sidebar');
        const wrap = document.getElementById('main-wrap');
        const backdrop = document.getElementById('sidebar-backdrop');
        const collapseIco = document.getElementById('ico-collapse');
        const expandIco = document.getElementById('ico-expand');
        sb.classList.toggle('lg:w-16', sidebarCollapsed);
        sb.classList.toggle('sb-collapsed', sidebarCollapsed);
        sb.classList.toggle('lg:w-64', !sidebarCollapsed);
        sb.classList.toggle('translate-x-0', sidebarMobileOpen);
        sb.classList.toggle('-translate-x-full', !sidebarMobileOpen);
        wrap.classList.toggle('lg:ms-16', sidebarCollapsed);
        wrap.classList.toggle('lg:ms-64', !sidebarCollapsed);
        backdrop.classList.toggle('is-open', !!sidebarMobileOpen);
        document.querySelectorAll('.sidebar-label').forEach((label) => label.classList.toggle('lg:hidden', sidebarCollapsed));
        const isLg = window.matchMedia('(min-width: 1024px)').matches;
        collapseIco.style.display = (isLg && !sidebarCollapsed) ? 'block' : 'none';
        expandIco.style.display = (isLg && sidebarCollapsed) ? 'block' : 'none';
      }
      function toggleColorMode() {
        const isDark = document.documentElement.classList.toggle('dark');
        try { localStorage.setItem('color-mode', isDark ? 'dark' : 'light'); } catch (e) {}
      }

      function renderAll() {
        renderHeader();
        renderTabs();
        renderTabPanel();
        renderTaskDrawer();
        renderTodoCreate();
        applySidebarState();
        if (window.lucide) lucide.createIcons();
      }
      document.addEventListener('keydown', (e) => {
        if (e.key !== 'Escape') return;
        if (store.get().taskDrawerId != null) closeTaskDrawer();
        else if (store.get().todoCreateOpen) closeTodoCreate();
      });
      store.subscribe(renderAll);

      window.addEventListener('resize', applySidebarState);
      window.addEventListener('DOMContentLoaded', () => {
        if (window.lucide) lucide.createIcons();
        renderAll();
      });
    
      // Command Palette
      const CMD_TARGETS = [
        { kind: 'page', title: 'Dashboard', subtitle: 'Workspace overview', icon: 'layout-dashboard', href: 'home.html' },
        { kind: 'page', title: 'Calendar', subtitle: 'Month, week, 3-month, unscheduled', icon: 'calendar-days', href: 'calendar.html' },
        { kind: 'page', title: 'Jobs', subtitle: 'All jobs and statuses', icon: 'hard-hat', href: 'jobs.html' },
        { kind: 'page', title: 'Todos', subtitle: 'Kanban + list', icon: 'check-square', href: 'tasks.html' },
        { kind: 'page', title: 'Employees', subtitle: 'Directory and roles', icon: 'users', href: 'employees.html' },
        { kind: 'page', title: 'Changelog', subtitle: 'What is new', icon: 'megaphone', href: 'changelog.html' },
        { kind: 'job', title: 'Job #1042 · Westbrook commercial complex', subtitle: 'In Process · Toronto, ON', icon: 'hard-hat', href: 'jobs-detail.html#job-1042' },
        { kind: 'job', title: 'Job #1058 · Greenfield warehouse expansion', subtitle: 'Confirmed · Hamilton, ON', icon: 'hard-hat', href: 'jobs.html' },
        { kind: 'job', title: 'Job #1063 · Riverside utilities trenching', subtitle: 'Confirmed · Burlington, ON', icon: 'hard-hat', href: 'jobs.html' },
        { kind: 'task', title: 'Pour foundation slab — north wing', subtitle: 'Flatwork · #1042', icon: 'hammer', href: 'calendar.html#task-t3' },
        { kind: 'task', title: 'Form wall sections A1–A4', subtitle: 'Forming · #1042', icon: 'hammer', href: 'calendar.html#task-t4' },
        { kind: 'task', title: 'Excavate basement footprint', subtitle: 'Excavating · #1042', icon: 'hammer', href: 'calendar.html#task-t1' },
        { kind: 'todo', title: 'Submit RFI for column spacing', subtitle: 'High priority · Change Order', icon: 'check-square', href: 'tasks.html' },
        { kind: 'todo', title: 'Daily safety briefing — confined space entry', subtitle: 'Urgent · Safety', icon: 'check-square', href: 'tasks.html' },
        { kind: 'user', title: 'Nazar K.', subtitle: 'Super Admin · Office', icon: 'user', href: 'employees.html' },
        { kind: 'user', title: 'Anna Lee', subtitle: 'Admin · Office', icon: 'user', href: 'employees.html' },
        { kind: 'user', title: 'Mark Chen', subtitle: 'Foreman · Field', icon: 'user', href: 'employees.html' }
      ];
      const CMD_KIND_LABELS = { job: 'Jobs', task: 'Tasks', todo: 'Todos', user: 'Users', page: 'Pages' };
      const CMD_KIND_ORDER = ['page', 'job', 'task', 'todo', 'user'];
      let cmdActiveIndex = 0;
      let cmdQuery = '';

      function openCmdPalette() {
        const root = document.getElementById('cmd-palette');
        if (!root) return;
        root.classList.add('is-open');
        cmdQuery = '';
        cmdActiveIndex = 0;
        const inp = document.getElementById('cmd-palette-input');
        if (inp) { inp.value = ''; setTimeout(() => inp.focus(), 60); }
        renderCmdPalette();
      }
      function closeCmdPalette() {
        const root = document.getElementById('cmd-palette');
        if (root) root.classList.remove('is-open');
      }
      function onCmdPaletteInput(e) {
        cmdQuery = e.target.value;
        cmdActiveIndex = 0;
        renderCmdPalette();
      }
      function cmdFiltered() {
        const q = cmdQuery.trim().toLowerCase();
        if (!q) return CMD_TARGETS.filter((x) => x.kind === 'page');
        return CMD_TARGETS.filter((x) =>
          x.title.toLowerCase().includes(q) || x.subtitle.toLowerCase().includes(q)
        );
      }
      function renderCmdPalette() {
        const root = document.getElementById('cmd-palette-results');
        if (!root) return;
        while (root.firstChild) root.removeChild(root.firstChild);
        const items = cmdFiltered();
        if (!items.length) {
          const empty = document.createElement('div');
          empty.className = 'flex flex-col items-center justify-center gap-2 py-12 text-center';
          empty.setAttribute('data-comment', 'cmd-palette-empty');
          const ico = document.createElement('div');
          ico.className = 'w-10 h-10 rounded-3xl bg-stone-50 dark:bg-stone-800 flex items-center justify-center';
          const i = document.createElement('i'); i.setAttribute('data-lucide', 'search-x'); i.className = 'w-6 h-6 text-stone-400';
          ico.appendChild(i); empty.appendChild(ico);
          const p1 = document.createElement('p'); p1.className = 'text-sm font-semibold text-stone-900 dark:text-stone-50 m-0'; p1.textContent = 'No results';
          const p2 = document.createElement('p'); p2.className = 'text-xs text-stone-400 dark:text-stone-500 mt-0.5 m-0'; p2.textContent = 'Try a different query';
          empty.appendChild(p1); empty.appendChild(p2);
          root.appendChild(empty);
          if (window.lucide) lucide.createIcons();
          return;
        }
        const groups = {};
        items.forEach((it) => { (groups[it.kind] = groups[it.kind] || []).push(it); });
        let flatIdx = 0;
        CMD_KIND_ORDER.forEach((kind) => {
          if (!groups[kind]) return;
          const header = document.createElement('div');
          header.className = 'cmd-section-header';
          header.setAttribute('data-comment', 'cmd-palette-section-' + kind);
          const hi = document.createElement('i');
          hi.setAttribute('data-lucide', kind === 'page' ? 'layout-grid' : kind === 'job' ? 'hard-hat' : kind === 'task' ? 'hammer' : kind === 'todo' ? 'check-square' : 'users');
          hi.className = 'w-3.5 h-3.5';
          header.appendChild(hi);
          header.appendChild(document.createTextNode(CMD_KIND_LABELS[kind]));
          root.appendChild(header);
          groups[kind].forEach((it) => {
            const idx = flatIdx++;
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'cmd-result' + (idx === cmdActiveIndex ? ' is-active' : '');
            btn.setAttribute('data-comment', 'cmd-palette-result-' + idx);
            btn.onclick = () => { closeCmdPalette(); window.location.href = it.href; };
            btn.onmouseenter = () => { cmdActiveIndex = idx; document.querySelectorAll('.cmd-result').forEach((b, i) => b.classList.toggle('is-active', i === idx)); };
            const ic = document.createElement('i'); ic.setAttribute('data-lucide', it.icon); ic.className = 'w-4 h-4 shrink-0 text-stone-400';
            btn.appendChild(ic);
            const inner = document.createElement('div'); inner.className = 'flex-1 min-w-0';
            const t = document.createElement('p'); t.className = 'text-sm font-medium text-stone-900 dark:text-stone-50 truncate m-0'; t.textContent = it.title;
            const s = document.createElement('p'); s.className = 'text-xs text-stone-400 dark:text-stone-500 truncate mt-0.5 m-0'; s.textContent = it.subtitle;
            inner.appendChild(t); inner.appendChild(s);
            btn.appendChild(inner);
            const tag = document.createElement('span');
            tag.className = 'text-[10px] uppercase tracking-wider font-semibold text-stone-400 dark:text-stone-500 shrink-0';
            tag.textContent = it.kind;
            btn.appendChild(tag);
            root.appendChild(btn);
          });
        });
        if (window.lucide) lucide.createIcons();
      }
      function onCmdPaletteKey(e) {
        const items = cmdFiltered();
        if (e.key === 'ArrowDown') { e.preventDefault(); cmdActiveIndex = Math.min(items.length - 1, cmdActiveIndex + 1); renderCmdPalette(); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); cmdActiveIndex = Math.max(0, cmdActiveIndex - 1); renderCmdPalette(); }
        else if (e.key === 'Enter') { e.preventDefault(); const it = items[cmdActiveIndex]; if (it) { closeCmdPalette(); window.location.href = it.href; } }
      }
      document.addEventListener('keydown', (e) => {
        const root = document.getElementById('cmd-palette');
        if (!root) return;
        if ((e.metaKey || e.ctrlKey) && e.key && e.key.toLowerCase() === 'k') {
          e.preventDefault();
          if (root.classList.contains('is-open')) closeCmdPalette();
          else openCmdPalette();
        } else if (e.key === 'Escape' && root.classList.contains('is-open')) {
          closeCmdPalette();
        }
      });
      window.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('[data-comment="header-search"]').forEach((btn) => btn.addEventListener('click', openCmdPalette));
      });

    
      // Quick Actions handlers — open dialog if on the right page, else navigate with #new hash
      function quickCreateTask() {
        if (typeof openCreateDialog === 'function' && document.getElementById('create-dialog')) {
          openCreateDialog();
        } else {
          window.location.href = 'tasks.html#new';
        }
      }
      function quickAddUser() {
        if (typeof openCreate === 'function' && document.getElementById('edit-dialog')) {
          openCreate();
        } else {
          window.location.href = 'employees.html#new';
        }
      }
      // Auto-open dialog when arriving with #new hash
      window.addEventListener('DOMContentLoaded', () => {
        if (window.location.hash !== '#new') return;
        setTimeout(() => {
          if (typeof openCreateDialog === 'function' && document.getElementById('create-dialog')) openCreateDialog();
          else if (typeof openCreate === 'function' && document.getElementById('edit-dialog')) openCreate();
          history.replaceState(null, '', window.location.pathname);
        }, 100);
      });

    
      // Sidebar user popover
      function toggleUserPopover(e) {
        if (e) e.stopPropagation();
        const pop = document.getElementById('user-popover');
        if (pop) pop.classList.toggle('is-open');
      }
      function closeUserPopover() {
        const pop = document.getElementById('user-popover');
        if (pop) pop.classList.remove('is-open');
      }
      function signOut() {
        window.location.href = 'login.html';
      }
      document.addEventListener('mousedown', (e) => {
        const pop = document.getElementById('user-popover');
        if (!pop) return;
        if (pop.classList.contains('is-open') &&
            !e.target.closest('#user-popover') &&
            !e.target.closest('[data-comment="sidebar-user-button"]')) {
          closeUserPopover();
        }
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeUserPopover();
      });

    </script>
  
      <div id="cmd-palette" data-comment="cmd-palette" data-component="dialog" class="cmd-palette-root">
        <div class="cmd-palette-backdrop" onclick="closeCmdPalette()">
          <div class="cmd-palette-panel" data-comment="cmd-palette-panel" onclick="event.stopPropagation()">
            <div data-comment="cmd-palette-search-wrap" class="p-3 border-b border-stone-200 dark:border-stone-800 shrink-0">
              <div class="flex items-center gap-2.5 px-4 h-9 rounded-full bg-stone-100 dark:bg-stone-800 border border-transparent">
                <i data-lucide="search" class="w-4 h-4 text-stone-400 shrink-0"></i>
                <input id="cmd-palette-input" data-comment="cmd-palette-input" data-component="input" type="text" placeholder="Search jobs, tasks, todos..." class="flex-1 bg-transparent text-sm text-stone-900 dark:text-stone-50 placeholder:text-stone-400 outline-none border-0" oninput="onCmdPaletteInput(event)" onkeydown="onCmdPaletteKey(event)" />
                <kbd class="inline-flex items-center text-[10px] font-medium text-stone-400 border border-stone-300 dark:border-stone-600 rounded px-1.5 py-0.5 bg-white dark:bg-stone-700 leading-none">ESC</kbd>
              </div>
            </div>
            <div data-comment="cmd-palette-results" id="cmd-palette-results" class="flex-1 overflow-y-auto"></div>
          </div>
        </div>
      </div>

  </body>
</html>
