    <script>
      (function () {
        try {
          var t = localStorage.getItem('color-mode');
          if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }

          var appTheme = localStorage.getItem('app-theme') || 'default';
          var appFont = localStorage.getItem('app-font') || 'inter';
          if (appTheme !== 'default') {
            document.documentElement.classList.add('theme-' + appTheme);
            document.documentElement.setAttribute('data-accent', '');
          }
          document.documentElement.classList.add('font-' + appFont);
        } catch (e) {}
      })();
    </script>

      .calendar-bar {

        cursor: pointer; transition: filter 120ms, box-shadow 150ms;

      }

      @keyframes bar-in { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: translateY(0); } }

      function el(tag, attrs = {}, children = []) {
        const node = document.createElement(tag);
        for (const [k, v] of Object.entries(attrs)) {
          if (v == null || v === false) continue;
          if (k === 'class') node.className = v;
          else if (k === 'style') node.setAttribute('style', v);
          else if (k.startsWith('on') && typeof v === 'function') node[k] = v;
          else node.setAttribute(k, v === true ? '' : v);
        }
        for (const c of [].concat(children)) {
          if (c == null || c === false) continue;
          node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
        }
        return node;
      }
      const lucideEl = (name, cls, extra = {}) => el('i', { 'data-lucide': name, class: cls, ...extra });
      const clear = (n) => { while (n.firstChild) n.removeChild(n.firstChild); };

      function filteredTasks() {
        const { tasks, selectedType, showTentative, showUnassigned, excludedUsers } = store.get();
        return tasks.filter((t) => {
          if (selectedType !== 'all' && t.type !== selectedType) return false;
          if (!showTentative && t.job_status === 'Tentative') return false;
          if (!showUnassigned && t.assigned_users.length === 0) return false;
          if (t.assigned_users.some((u) => isForeman(u) && excludedUsers.includes(u.id))) return false;
          return true;
        });
      }

      function colorOf(task) {
        const f = task.assigned_users.find(isForeman);
        return f ? f.color : taskType(task.type).color;
      }

      function barVisualStyle(task, borderWidth = '2px') {
        const foreman = task.assigned_users.find(isForeman);
        const isTentative = task.job_status === 'Tentative';
        if (foreman) {
          // Foreman-assigned: solid foreman color background, white text
          return `background: ${foreman.color}; color: white;` + (isTentative ? ' outline: 2px dashed rgba(255,255,255,0.55); outline-offset: -3px;' : '');
        }
        // Unassigned: transparent bg, thick border in type color
        const tc = taskType(task.type).color;
        return `background: transparent; color: ${tc}; border: ${borderWidth} ${isTentative ? 'dashed' : 'solid'} currentColor;`;
      }

      function buildMonthGrid(monthDate) {
        const start = startOfWeek(startOfMonth(monthDate));
        const end = endOfWeek(endOfMonth(monthDate));
        const days = [];
        for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
          const date = new Date(d);
          days.push({ date, isToday: sameDay(date, today), currentMonth: sameMonth(date, monthDate) });
        }
        const weeks = [];
        for (let i = 0; i < days.length; i += 7) weeks.push(days.slice(i, i + 7));
        return weeks;
      }

      function buildBars(tasks, weekDays) {
        const ws = weekDays[0].date;
        const we = weekDays[6].date;
        const inWeek = tasks.filter((t) => {
          if (!t.start_date || !t.end_date) return false;
          const s = parseISO(t.start_date);
          const e = parseISO(t.end_date);
          return s <= we && e >= ws;
        });
        const tracks = [];
        return inWeek.map((t) => {
          const s = parseISO(t.start_date);
          const e = parseISO(t.end_date);
          const clipsLeft = s < ws;
          const clipsRight = e > we;
          const startCol = clipsLeft ? 0 : s.getDay();
          const endCol = clipsRight ? 6 : e.getDay();
          const endDate = clipsRight ? we : e;
          let track = tracks.findIndex((tk) => tk < s);
          if (track === -1) { track = tracks.length; tracks.push(endDate); }
          else tracks[track] = endDate;
          return { task: t, startCol, span: endCol - startCol + 1, track, clipsLeft, clipsRight };
        });
      }

      function renderCapacity() {
        const { activeTab, currentMonth, selectedType } = store.get();
        const root = document.getElementById('capacity-row');
        clear(root);
        if (activeTab === 'unscheduled') return;

        const months = activeTab === '3month' ? [addMonths(currentMonth, -1), currentMonth, addMonths(currentMonth, 1)] : [currentMonth];
        const isMulti = months.length > 1;
        const wrap = el('div', { class: isMulti ? 'flex gap-3' : '' });

        const computeMonth = (m) => {
          const monthStart = startOfMonth(m), monthEnd = endOfMonth(m);
          const monthTasks = filteredTasks().filter((t) => {
            if (!t.start_date || !t.end_date) return false;
            const s = parseISO(t.start_date), e = parseISO(t.end_date);
            return s <= monthEnd && e >= monthStart;
          });
          let booked = 0, tentative = 0;
          monthTasks.forEach((t) => {
            const s = parseISO(t.start_date), e = parseISO(t.end_date);
            const overlapStart = s > monthStart ? s : monthStart;
            const overlapEnd = e < monthEnd ? e : monthEnd;
            const days = Math.max(1, Math.round((overlapEnd - overlapStart) / 86400000) + 1);
            const hours = days * 8;
            if (t.job_status === 'Tentative') tentative += hours;
            else booked += hours;
          });
          const available = 160;
          const remaining = available - booked - tentative;
          return { monthDate: m, available, booked, tentative, remaining };
        };

        if (isMulti) {
          // 3-month: per-month CapacityCard with 4 rows (Available/Booked/Tentative/Remaining)
          months.forEach((m) => {
            const c = computeMonth(m);
            const card = el('div', {
              'data-comment': `capacity-${m.getFullYear()}-${m.getMonth() + 1}`,
              'data-component': 'card',
              class: `flex-1 bg-white dark:bg-stone-950 rounded-3xl border ${c.remaining < 0 ? 'border-red-300 dark:border-red-800' : 'border-stone-200 dark:border-stone-800'} p-4 flex flex-col min-w-0`
            });
            card.appendChild(el('p', {
              'data-comment': `capacity-${m.getFullYear()}-${m.getMonth() + 1}-month`,

            }, fmtMonthYear(m).toUpperCase()));
            const rowsWrap = el('div', { 'data-comment': `capacity-${m.getFullYear()}-${m.getMonth() + 1}-rows`, class: 'flex flex-col flex-1 gap-1.5' });
            const mkRow = (key, label, value, valueCls, divider) => {
              const r = el('div', {
                'data-comment': `capacity-${m.getFullYear()}-${m.getMonth() + 1}-${key}-row`,
                class: `flex items-center justify-between text-sm${divider ? ' pt-1 border-t border-stone-100 dark:border-stone-800' : ''}`
              });
              r.appendChild(el('span', { 'data-comment': `capacity-${m.getFullYear()}-${m.getMonth() + 1}-${key}-label`, class: 'text-stone-500 dark:text-stone-400' }, label));
              r.appendChild(el('span', { 'data-comment': `capacity-${m.getFullYear()}-${m.getMonth() + 1}-${key}-value`, class: `font-semibold tabular-nums ${valueCls}` }, `${value} hrs`));
              return r;
            };
            rowsWrap.appendChild(mkRow('available', 'Available', c.available, 'text-stone-700 dark:text-stone-300'));
            rowsWrap.appendChild(mkRow('booked', 'Booked', c.booked, 'text-stone-700 dark:text-stone-300'));
            rowsWrap.appendChild(mkRow('tentative', 'Tentative', c.tentative, 'text-violet-500 dark:text-violet-400'));
            rowsWrap.appendChild(mkRow(
              c.remaining < 0 ? 'overbooked' : 'remaining',
              c.remaining < 0 ? 'Overbooked' : 'Remaining',
              Math.abs(c.remaining),
              c.remaining < 0 ? 'text-red-500 dark:text-red-400' : 'text-teal-600 dark:text-teal-400',
              true
            ));
            card.appendChild(rowsWrap);
            wrap.appendChild(card);
          });
        } else {
          // Single-month: 4 stat cards matching Vue CapacityMetrics (no icon, big number, "hrs" suffix)
          const c = computeMonth(months[0]);
          const cards = el('div', { class: 'grid grid-cols-2 lg:grid-cols-4 gap-4' });
          const cap = (key, label, value, opts) => {
            const overbooked = !!opts.overbooked;
            const card = el('div', {
              'data-comment': `capacity-card-${key}`,
              'data-component': 'card',
              class: `bg-white dark:bg-stone-950 rounded-3xl border ${overbooked ? 'border-red-300 dark:border-red-800' : 'border-stone-200 dark:border-stone-800'} p-4 flex flex-col justify-between min-h-[6.25rem]`
            });

              'data-comment': `capacity-card-${key}-label`,

            }, label));
            const big = el('p', {
              'data-comment': `capacity-card-${key}-value`,

            }, 'hrs'));
            card.appendChild(big);
            return card;

          cards.appendChild(cap('available', 'Available Hours', c.available, {}));
          cards.appendChild(cap('booked', 'Booked Hours', c.booked, {}));

        if (noBars) {

          const DATE_OFFSET = 36, BAR_H = 42, BAR_GAP = 4, BAR_SPACING = BAR_H + BAR_GAP, BOTTOM_PAD = 4;
          weeks.forEach((week, wi) => {
            const bars = allBars[wi];
            const trackCount = bars.length ? Math.max(...bars.map((b) => b.track)) + 1 : 1;
            const rowH = DATE_OFFSET + trackCount * BAR_SPACING - BAR_GAP + BOTTOM_PAD;
            const row = el('div', { class: 'relative border-b border-stone-200 dark:border-stone-700 last:border-b-0', style: `height: ${rowH}px` });

            const barsLayer = el('div', { class: 'absolute inset-x-0', style: `top: ${DATE_OFFSET}px; bottom: ${BOTTOM_PAD}px; pointer-events: none;` });

              const t = b.task;
              const visual = barVisualStyle(t);

              });

                bar.appendChild(el('span', { class: 'absolute left-2 top-1/2 -translate-y-1/2 w-1.5 h-1.5 rounded-full shrink-0', style: `background:${taskType(t.type).color}` }));
              }
              bar.appendChild(el('span', { class: 'truncate', title: `#${t.job_id} ${t.descr}` }, `#${t.job_id} ${t.descr}`));
              barsLayer.appendChild(bar);
            });
            row.appendChild(barsLayer);
            wrap.appendChild(row);
          });
          inner.appendChild(wrap);
        }
        card.appendChild(inner);
        return card;

            'data-comment': `week-tab-${i}`,
            'aria-selected': String(active),
            onclick: () => store.set({ currentWeek: week.start }),
            class: 'tab-pill px-3.5 py-1.5 rounded-full text-sm font-medium transition-colors duration-100 cursor-pointer select-none whitespace-nowrap outline-none text-stone-500 dark:text-stone-400 hover:text-stone-700 dark:hover:text-stone-300'
          }, week.label));
        });
        tabsWrap.appendChild(tabs);
        inner.appendChild(tabsWrap);

        const weekStart = startOfWeek(currentWeek);
        const weekEnd = endOfWeek(currentWeek);
        const days = Array.from({ length: 7 }, (_, i) => {
          const d = new Date(weekStart);
          d.setDate(d.getDate() + i);
          return { date: d, isToday: sameDay(d, today) };
        });

        const headRow = el('div', { 'data-comment': 'week-day-headers', class: 'grid grid-cols-7 shrink-0' });
        days.forEach((d, i) => {
          const cell = el('div', { 'data-comment': `week-header-${i}`, class: 'py-2.5 flex flex-col items-center justify-center border-r border-stone-200 dark:border-stone-700 last:border-r-0' });
          cell.appendChild(el('span', {
            'data-comment': `week-header-${i}-name`,
            class: `text-xs font-medium ${d.isToday ? 'text-brand-500' : 'text-stone-400 dark:text-stone-500'}`
          }, ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.date.getDay()]));
          cell.appendChild(el('span', {
            'data-comment': `week-header-${i}-day`,
            class: `mt-0.5 inline-flex w-7 h-7 items-center justify-center rounded-full text-sm font-semibold ${d.isToday ? 'bg-brand-500 text-white' : 'text-stone-700 dark:text-stone-300'}`
          }, String(d.date.getDate())));
          headRow.appendChild(cell);
        });
        inner.appendChild(headRow);

        const weekTasks = filteredTasks()
          .filter((t) => {
            if (!t.start_date || !t.end_date) return false;
            const s = parseISO(t.start_date);
            const e = parseISO(t.end_date);
            return s <= weekEnd && e >= weekStart;
          })
          .map((t) => {
            const s = parseISO(t.start_date);
            const e = parseISO(t.end_date);
            const startsBeforeWeek = s < weekStart;
            const endsAfterWeek = e > weekEnd;
            return {
              task: t,
              startCol: startsBeforeWeek ? 0 : s.getDay(),
              endCol: endsAfterWeek ? 6 : e.getDay(),
              startsBeforeWeek,
              endsAfterWeek,
              dateRange: `${shortDayMonth(s)} – ${shortDayMonth(e)}`
            };
          });

        const rows = el('div', { 'data-comment': 'week-task-rows', class: 'flex-1 overflow-y-auto flex flex-col' });
        if (!weekTasks.length) {
          const empty = el('div', { 'data-comment': 'week-empty', class: 'flex-1 flex items-center justify-center' });
          const e = el('div', { 'data-comment': 'week-empty-content', class: 'flex flex-col items-center justify-center gap-3 py-12 text-center' });
          const ico = el('div', { 'data-comment': 'week-empty-icon', class: 'w-10 h-10 rounded-3xl bg-stone-50 dark:bg-stone-800 flex items-center justify-center' });
          ico.appendChild(lucideEl('calendar-x', 'w-8 h-8 text-stone-400 dark:text-stone-500', { 'data-comment': 'week-empty-icon-svg' }));
          e.appendChild(ico);
          e.appendChild(el('p', { 'data-comment': 'week-empty-title', class: 'text-sm font-semibold text-stone-900 dark:text-stone-50 m-0' }, 'No jobs this week'));
          e.appendChild(el('p', { 'data-comment': 'week-empty-description', class: 'text-xs text-stone-400 dark:text-stone-500 mt-0.5 m-0' }, 'No jobs are scheduled for this period'));
          empty.appendChild(e);
          rows.appendChild(empty);
        } else {
          weekTasks.forEach((row, idx) => {
            const t = row.task;
            const item = el('div', {
              'data-comment': `week-row-${t.autoid}`,
              class: 'relative shrink-0',
              style: 'height: 100px'
            });
            const cols = el('div', { 'data-comment': `week-row-${t.autoid}-cols`, class: 'absolute inset-0 grid grid-cols-7 pointer-events-none' });
            days.forEach((d, i) => {
              cols.appendChild(el('div', {
                'data-comment': `week-row-${t.autoid}-col-${i}`,
                class: `border-r border-stone-200 dark:border-stone-700 last:border-r-0 ${d.isToday ? 'bg-stone-50/80 dark:bg-stone-800/20' : ''}`
              }));
            });
            item.appendChild(cols);
            const radius = `${row.startsBeforeWeek ? '0' : '12px'} ${row.endsAfterWeek ? '0' : '12px'} ${row.endsAfterWeek ? '0' : '12px'} ${row.startsBeforeWeek ? '0' : '12px'}`;
            const bar = el('div', {
              'data-comment': `week-bar-${t.autoid}`,
              class: 'absolute top-3 bottom-3 flex flex-col justify-center px-4 overflow-hidden cursor-pointer transition-filter duration-100 transition-shadow hover:brightness-110',
              style: `left: calc(${row.startCol} / 7 * 100% + 6px); right: calc((6 - ${row.endCol}) / 7 * 100% + 6px); border-radius: ${radius}; ${barVisualStyle(t)}`,
              onclick: () => store.set({ drawerTaskId: t.autoid })
            });
            if (row.startsBeforeWeek) bar.appendChild(lucideEl('arrow-left', 'absolute left-2 top-1/2 -translate-y-1/2 w-3.5 h-3.5 opacity-70 shrink-0', { 'data-comment': `week-bar-${t.autoid}-left` }));
            const body = el('div', { 'data-comment': `week-bar-${t.autoid}-body`, class: row.startsBeforeWeek ? 'pl-5' : '' });
            body.appendChild(el('p', { 'data-comment': `week-bar-${t.autoid}-title`, class: 'text-sm font-bold leading-tight truncate m-0', title: `#${t.job_id} ${t.descr}` }, `#${t.job_id} ${t.descr}`));
            body.appendChild(el('p', { 'data-comment': `week-bar-${t.autoid}-type`, class: 'text-xs mt-0.5 opacity-80 truncate m-0' }, taskType(t.type).label));
            body.appendChild(el('p', { 'data-comment': `week-bar-${t.autoid}-range`, class: 'text-xs mt-0.5 opacity-60 truncate m-0' }, row.dateRange));
            bar.appendChild(body);
            if (row.endsAfterWeek) bar.appendChild(lucideEl('arrow-right', 'absolute right-2 top-1/2 -translate-y-1/2 w-3.5 h-3.5 opacity-70 shrink-0', { 'data-comment': `week-bar-${t.autoid}-right` }));
            item.appendChild(bar);
            rows.appendChild(item);
          });
        }
        inner.appendChild(rows);
        card.appendChild(inner);
        return card;
      }

      function renderThreeMonthView() {
        const { currentMonth } = store.get();
        const wrap = el('div', { 'data-comment': 'three-month-view', class: 'flex-1 min-h-0 flex flex-col overflow-hidden' });
        const monthsWrap = el('div', { 'data-comment': 'three-month-months', class: 'flex-1 min-h-0 flex gap-3 overflow-x-auto' });
        [-1, 0, 1].forEach((off) => {
          const m = addMonths(currentMonth, off);
          const card = el('div', {
            'data-comment': `three-month-${off}`,
            'data-component': 'card',
            class: 'bg-white dark:bg-stone-950 rounded-3xl border border-stone-200 dark:border-stone-800 flex-1 min-w-64 min-h-0 flex flex-col overflow-hidden shadow-none'
          });
          const title = el('div', { 'data-comment': `three-month-${off}-title-wrap`, class: 'px-4 pt-3 pb-2 shrink-0 border-b border-stone-200 dark:border-stone-700' });
          title.appendChild(el('p', {
            'data-comment': `three-month-${off}-title`,
            class: 'text-xs font-bold text-stone-500 dark:text-stone-400 uppercase tracking-wide text-center m-0'
          }, fmtMonthYear(m).toUpperCase()));
          card.appendChild(title);
          const daysHead = el('div', { 'data-comment': `three-month-${off}-days`, class: 'grid grid-cols-7 border-b border-stone-200 dark:border-stone-700 shrink-0' });
          ['S','M','T','W','T','F','S'].forEach((n, i) => daysHead.appendChild(el('div', {
            'data-comment': `three-month-${off}-day-${i}`,
            class: 'py-1.5 text-center text-[10px] font-medium text-stone-400 dark:text-stone-500'
          }, n)));
          card.appendChild(daysHead);

          const body = el('div', { 'data-comment': `three-month-${off}-body`, class: 'flex-1 overflow-y-auto flex flex-col' });
          const weeks = buildMonthGrid(m);
          const tasks = filteredTasks();
          const DATE_OFFSET = 30, BAR_H = 20, BAR_GAP = 2, BAR_SPACING = BAR_H + BAR_GAP, BOTTOM_PAD = 4, MIN_ROW_H = 60;
          weeks.forEach((week, wi) => {
            const bars = buildBars(tasks, week);
            const trackCount = bars.length ? Math.max(...bars.map((b) => b.track)) + 1 : 0;
            const rowH = Math.max(DATE_OFFSET + trackCount * BAR_SPACING + BOTTOM_PAD, MIN_ROW_H);
            const row = el('div', {
              'data-comment': `three-month-${off}-week-${wi}`,
              class: 'relative border-b border-stone-200 dark:border-stone-700 last:border-b-0',
              style: `min-height: ${rowH}px`
            });
            const cells = el('div', { 'data-comment': `three-month-${off}-week-${wi}-cells`, class: 'absolute inset-0 grid grid-cols-7' });
            week.forEach((day, di) => {
              const cellCls = `day-cell ${day.isToday ? 'today' : ''} ${!day.currentMonth ? 'other-month' : ''}`;
              const cell = el('div', { 'data-comment': `three-month-${off}-week-${wi}-day-${di}`, class: `${cellCls} p-1` });
              cell.appendChild(el('span', { 'data-comment': `three-month-${off}-week-${wi}-day-${di}-num`, class: 'day-num', style: 'width: 1.25rem; height: 1.25rem; font-size: 10px;' }, String(day.date.getDate())));
              cells.appendChild(cell);
            });
            row.appendChild(cells);
            const layer = el('div', {
              'data-comment': `three-month-${off}-week-${wi}-bars`,
              class: 'absolute inset-x-0 pointer-events-none',
              style: `top: ${DATE_OFFSET}px; bottom: ${BOTTOM_PAD}px`
            });
            bars.forEach((b) => {
              const t = b.task;
              const radius = `${b.clipsLeft ? '0' : '4px'} ${b.clipsRight ? '0' : '4px'} ${b.clipsRight ? '0' : '4px'} ${b.clipsLeft ? '0' : '4px'}`;
              const bar = el('div', {
                'data-comment': `three-month-bar-${off}-${t.autoid}-${wi}-${b.startCol}`,
                class: 'absolute text-[10px] font-semibold overflow-hidden flex items-center px-2 pointer-events-auto cursor-pointer transition-shadow duration-150 hover:brightness-110',
                style: `height: ${BAR_H}px; left: calc(${b.startCol} / 7 * 100% + 2px); width: calc(${b.span} / 7 * 100% - 4px); top: ${b.track * BAR_SPACING}px; border-radius: ${radius}; ${barVisualStyle(t, '1px')}`,
                onclick: () => store.set({ drawerTaskId: t.autoid })
              });
              if (!t.assigned_users.some(isForeman)) {
                bar.appendChild(el('span', { 'data-comment': `three-month-bar-${off}-${t.autoid}-${wi}-${b.startCol}-dot`, class: 'w-1.5 h-1.5 rounded-full shrink-0 mr-1', style: `background:${taskType(t.type).color}` }));
              }
              bar.appendChild(el('span', { 'data-comment': `three-month-bar-${off}-${t.autoid}-${wi}-${b.startCol}-text`, class: 'truncate', title: `#${t.job_id} ${t.descr}` }, `#${t.job_id} ${t.descr}`));
              layer.appendChild(bar);
            });
            row.appendChild(layer);
            body.appendChild(row);
          });
          card.appendChild(body);
          monthsWrap.appendChild(card);
        });
        wrap.appendChild(monthsWrap);
        return wrap;
      }

      function renderUnscheduledView() {
        const tasks = filteredTasks().filter((t) => !t.start_date || !t.end_date);
        const card = el('div', { 'data-comment': 'unscheduled-view', 'data-component': 'card', class: 'flex-1 min-h-0 flex flex-col bg-white dark:bg-stone-950 rounded-3xl border border-stone-200 dark:border-stone-800 overflow-hidden' });
        if (!tasks.length) {
          const empty = el('div', { 'data-comment': 'unscheduled-empty', class: 'flex-1 flex flex-col items-center justify-center gap-3 py-12 text-center' });
          const ico = el('div', { 'data-comment': 'unscheduled-empty-icon', class: 'w-10 h-10 rounded-3xl bg-stone-50 dark:bg-stone-800 flex items-center justify-center' });
          ico.appendChild(lucideEl('calendar-clock', 'w-8 h-8 text-stone-400 dark:text-stone-500', { 'data-comment': 'unscheduled-empty-icon-svg' }));
          empty.appendChild(ico);
          empty.appendChild(el('p', { 'data-comment': 'unscheduled-empty-title', class: 'text-sm font-semibold text-stone-900 dark:text-stone-50 m-0' }, 'Nothing unscheduled'));
          empty.appendChild(el('p', { 'data-comment': 'unscheduled-empty-description', class: 'text-xs text-stone-400 dark:text-stone-500 mt-0.5 m-0' }, 'All tasks have dates assigned'));
          card.appendChild(empty);
          return card;
        }
        const tableWrap = el('div', { 'data-comment': 'unscheduled-table-wrap', class: 'flex-1 overflow-auto' });
        const table = el('table', { 'data-comment': 'unscheduled-table', 'data-component': 'table', class: 'w-full text-sm' });
        const thead = el('thead', { 'data-comment': 'unscheduled-table-head', class: 'bg-stone-50 dark:bg-stone-950 sticky top-0 z-10' });
        const headerRow = el('tr', { 'data-comment': 'unscheduled-table-header-row', class: 'text-left' });
        ['Job', 'Task', 'Type', 'Foreman', 'Est. Hours', 'Status'].forEach((h) => {
          headerRow.appendChild(el('th', { 'data-comment': `unscheduled-table-head-${slug(h)}`, class: 'px-4 py-3 text-xs font-medium text-stone-500 dark:text-stone-400 whitespace-nowrap' }, h));
        });
        thead.appendChild(headerRow);
        table.appendChild(thead);

        const tbody = el('tbody', { 'data-comment': 'unscheduled-table-body' });
        tasks.forEach((t) => {
          const tt = taskType(t.type);
          const foreman = t.assigned_users.find(isForeman);
          const tr = el('tr', {
            'data-comment': `unscheduled-row-${t.autoid}`,
            class: 'border-t border-stone-100 dark:border-stone-800 hover:bg-stone-50 dark:hover:bg-stone-900/40 transition-colors cursor-pointer',
            onclick: () => store.set({ drawerTaskId: t.autoid })
          });
          // Job
          tr.appendChild(el('td', { 'data-comment': `unscheduled-row-${t.autoid}-job-cell`, class: 'px-4 py-3 whitespace-nowrap' }, [
            el('span', { 'data-comment': `unscheduled-row-${t.autoid}-job`, class: 'font-mono text-sm font-medium text-stone-900 dark:text-stone-50' }, `#${t.job_id}`)
          ]));
          // Task descr
          tr.appendChild(el('td', { 'data-comment': `unscheduled-row-${t.autoid}-descr-cell`, class: 'px-4 py-3' }, [
            el('span', { 'data-comment': `unscheduled-row-${t.autoid}-descr`, class: 'text-sm text-stone-700 dark:text-stone-300' }, t.descr)
          ]));
          // Type
          const typeTag = el('span', {
            'data-comment': `unscheduled-row-${t.autoid}-type`,
            class: 'inline-flex items-center gap-1.5 text-xs font-medium px-2.5 py-1 rounded-full border whitespace-nowrap',
            style: `color:${tt.color};background:${tt.color}1a;border-color:${tt.color}66`
          });
          typeTag.appendChild(el('span', { 'data-comment': `unscheduled-row-${t.autoid}-type-dot`, class: 'w-1.5 h-1.5 rounded-full', style: `background:${tt.color}` }));
          typeTag.appendChild(document.createTextNode(tt.label));
          tr.appendChild(el('td', { 'data-comment': `unscheduled-row-${t.autoid}-type-cell`, class: 'px-4 py-3' }, [typeTag]));
          // Foreman
          const fCell = el('td', { 'data-comment': `unscheduled-row-${t.autoid}-foreman-cell`, class: 'px-4 py-3 whitespace-nowrap' });
          if (foreman) {
            const fwrap = el('div', { 'data-comment': `unscheduled-row-${t.autoid}-foreman-wrap`, class: 'inline-flex items-center gap-1.5' });
            fwrap.appendChild(el('span', { 'data-comment': `unscheduled-row-${t.autoid}-foreman-dot`, class: 'w-2 h-2 rounded-full shrink-0', style: `background:${foreman.color}` }));
            fwrap.appendChild(el('span', { 'data-comment': `unscheduled-row-${t.autoid}-foreman`, class: 'text-sm text-stone-700 dark:text-stone-300' }, displayName(foreman)));
            fCell.appendChild(fwrap);
          } else {
            fCell.appendChild(el('span', { 'data-comment': `unscheduled-row-${t.autoid}-foreman-empty`, class: 'text-sm text-stone-400 dark:text-stone-500' }, '—'));
          }
          tr.appendChild(fCell);
          // Est. Hours
          tr.appendChild(el('td', { 'data-comment': `unscheduled-row-${t.autoid}-hours-cell`, class: 'px-4 py-3 whitespace-nowrap' }, [
            el('span', { 'data-comment': `unscheduled-row-${t.autoid}-hours`, class: 'text-sm tabular-nums text-stone-700 dark:text-stone-300' }, t.estimated_hours ? `${t.estimated_hours}h` : '—')
          ]));
          // Status
          const statusTag = el('span', {
            'data-comment': `unscheduled-row-${t.autoid}-status`,
            class: 'inline-flex items-center gap-1.5 text-xs font-medium px-2.5 py-1 rounded-full whitespace-nowrap',
            style: t.job_status === 'Tentative' ? 'background:rgba(245,158,11,0.15);color:rgb(180,120,10)'
              : t.job_status === 'In Process' ? 'background:rgba(59,130,246,0.15);color:rgb(37,99,235)'
              : t.job_status === 'Confirmed' ? 'background:rgba(16,185,129,0.15);color:rgb(5,150,105)'
              : 'background:rgba(120,113,108,0.15);color:rgb(87,83,78)'
          }, t.job_status);
          tr.appendChild(el('td', { 'data-comment': `unscheduled-row-${t.autoid}-status-cell`, class: 'px-4 py-3' }, [statusTag]));
          tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        tableWrap.appendChild(table);
        card.appendChild(tableWrap);
        return card;
      }

      function renderView() {
        const root = document.getElementById('view-wrap');
        clear(root);
        const { activeTab, currentMonth } = store.get();
        let view;
        if (activeTab === 'month') view = renderMonthView(currentMonth);
        else if (activeTab === 'week') view = renderWeekView();
        else if (activeTab === '3month') view = renderThreeMonthView();
        else view = renderUnscheduledView();
        root.appendChild(view);
      }

        const displayHours = t.custom_estimated ?? t.estimated_hours ?? 0;

          el('span', { 'data-comment': 'drawer-parent-job-id', class: 'font-bold text-stone-900 dark:text-stone-50 group-hover:text-brand-600 dark:group-hover:text-brand-400 transition-colors' }, `#${t.job_id}`),
          el('span', { 'data-comment': 'drawer-parent-job-separator', class: 'mx-1.5 text-stone-300 dark:text-stone-600' }, '·'),
          el('span', { 'data-comment': 'drawer-parent-job-description', class: 'text-stone-600 dark:text-stone-300 group-hover:text-stone-800 dark:group-hover:text-stone-100 transition-colors' }, t.job_descr || 'Job')

        parentMeta.appendChild(statusTag(t.job_status, 'drawer-parent-job-status'));
        parentMeta.appendChild(lucideEl('arrow-right', 'w-3.5 h-3.5 text-stone-300 dark:text-stone-600 group-hover:text-brand-500 dark:group-hover:text-brand-400 group-hover:translate-x-0.5 transition-all ml-auto', { 'data-comment': 'drawer-parent-job-arrow' }));

        taskSection.appendChild(el('h3', { 'data-comment': 'drawer-task-title', class: 'text-xl font-bold text-stone-900 dark:text-stone-50 mb-2.5 m-0' }, t.descr));
        const taskTags = el('div', { 'data-comment': 'drawer-task-tags', class: 'flex items-center gap-2' });
        const tt = taskType(t.type);
        const typeP = el('span', {
          'data-comment': 'drawer-type',
          class: 'inline-flex items-center gap-1.5 text-xs font-medium px-2.5 py-1 rounded-full border w-fit',
          style: `color:${tt.color};background:${tt.color}1a;border-color:${tt.color}66`
        });
        typeP.appendChild(el('span', { 'data-comment': 'drawer-type-dot', class: 'w-1.5 h-1.5 rounded-full', style: 'background:currentColor' }));
        typeP.appendChild(document.createTextNode(tt.label));
        taskTags.appendChild(typeP);

      function startDrawerDateEdit(taskId, field) {
        const task = store.get().tasks.find((t) => t.autoid === taskId);
        if (!task) return;
        const value = field === 'startDate' ? (task.custom_start_date ?? task.start_date) : (task.custom_end_date ?? task.end_date);
        store.set({ drawerEditingField: field, drawerEditDateValue: value || localISODate(today) });
      }
      function cancelDrawerDateEdit() {
        store.set({ drawerEditingField: null, drawerEditDateValue: '' });
      }
      function saveDrawerDateEdit(taskId, field) {
        const value = document.getElementById(`drawer-${field}-input`)?.value || '';
        if (!value) return;
        store.set((s) => ({
          tasks: s.tasks.map((t) => {
            if (t.autoid !== taskId) return t;
            return field === 'startDate' ? { ...t, custom_start_date: value } : { ...t, custom_end_date: value };
          }),
          drawerEditingField: null,
          drawerEditDateValue: ''
        }));
      }
      function resetDrawerDateEdit(taskId, field) {
        store.set((s) => ({
          tasks: s.tasks.map((t) => {
            if (t.autoid !== taskId) return t;
            return field === 'startDate' ? { ...t, custom_start_date: null } : { ...t, custom_end_date: null };
          }),
          drawerEditingField: null,
          drawerEditDateValue: ''
        }));
      }
      function addDrawerTodo(jobId) {
        const id = Math.max(...TASK_TODOS.map((todo) => todo.id)) + 1;
        TASK_TODOS.unshift({
          id,
          job_id: jobId,
          title: 'New job follow-up',
          status: 'Not Started',
          type: 'General',
          priority: 'medium',
          due_date: localISODate(addMonths(today, 0)),
          created_by: USERS[0],
          assigned_users: [USERS[0]]
        });
        renderDrawer();
      }

      function toggleCrewDispatch(taskId, userId, dispatch) {
        store.set((s) => ({
          tasks: s.tasks.map((t) => {
            if (t.autoid !== taskId) return t;
            const user = USERS.find((u) => u.id === userId);
            if (!user) return t;
            const has = t.assigned_users.some((u) => u.id === userId);
            if (dispatch && !has) return { ...t, assigned_users: [...t.assigned_users, user] };
            if (!dispatch && has) return { ...t, assigned_users: t.assigned_users.filter((u) => u.id !== userId) };
            return t;
          })
        }));
      }

      }

        store.set({ [key]: value });
      }

        const { excludedUsers } = store.get();
        const next = excludedUsers.includes(id) ? excludedUsers.filter((x) => x !== id) : [...excludedUsers, id];
        store.set({ excludedUsers: next });
      }
      function prevMonth() {
        store.set((s) => {
          const currentMonth = addMonths(s.currentMonth, -1);
          return { currentMonth, monthPickerYear: currentMonth.getFullYear(), ...(s.activeTab === 'week' ? { currentWeek: startOfWeek(currentMonth) } : {}) };
        });
      }
      function nextMonth() {
        store.set((s) => {
          const currentMonth = addMonths(s.currentMonth, 1);
          return { currentMonth, monthPickerYear: currentMonth.getFullYear(), ...(s.activeTab === 'week' ? { currentWeek: startOfWeek(currentMonth) } : {}) };
        });
      }
      function resetToToday() { store.set({ currentMonth: startOfMonth(today), currentWeek: startOfWeek(today) }); }
      function closeDrawer() { store.set({ drawerTaskId: null, drawerEditingField: null, drawerEditDateValue: '' }); }

      function toggleMonthPicker(e) {
        e.stopPropagation();
        store.set((s) => ({
          monthPickerOpen: !s.monthPickerOpen,
          monthPickerYear: s.currentMonth.getFullYear(),
          settingsOpen: false,
          openSelect: null
        }));
      }
      function closeMonthPicker() {
        if (store.get().monthPickerOpen) store.set({ monthPickerOpen: false });
      }
      function setMonthPickerYear(delta) {
        store.set((s) => ({ monthPickerYear: s.monthPickerYear + delta }));
      }
      function selectPickerMonth(monthIndex) {
        store.set((s) => {
          const selected = startOfMonth(new Date(s.monthPickerYear, monthIndex, 1));
          let currentWeek = s.currentWeek;
          if (s.activeTab === 'week') {
            const preferred = new Date(selected.getFullYear(), selected.getMonth(), Math.min(s.currentWeek.getDate(), endOfMonth(selected).getDate()));
            currentWeek = startOfWeek(preferred);
          }
          return { currentMonth: selected, currentWeek, monthPickerOpen: false };
        });
      }

      function renderMonthPicker() {
        const root = document.getElementById('month-picker-content');
        const popover = document.getElementById('month-picker-popover');
        const button = document.getElementById('month-pill');
        if (!root || !popover || !button) return;
        const { monthPickerOpen, monthPickerYear, currentMonth } = store.get();
        popover.classList.toggle('hidden', !monthPickerOpen);
        button.setAttribute('aria-expanded', String(monthPickerOpen));
        if (!monthPickerOpen) return;

        root.innerHTML = '';
        const header = el('div', { 'data-comment': 'month-picker-header', class: 'flex items-center justify-between gap-2 px-1 pb-2' });

            onclick: () => selectPickerMonth(i)

      function applyTopbar() {
        const { activeTab, currentMonth, currentWeek, selectedType } = store.get();

        todo: { label: 'Todos', icon: 'check-square' },
        user: { label: 'Users', icon: 'users' }
      };
      const CMD_PARITY_GROUP_ORDER = ['page', 'job', 'task', 'todo', 'user'];
      let cmdParityActiveIndex = 0;
      let cmdParityQuery = '';
      let cmdParityFlatItems = [];
      function cmdParityEscape(value) {
        return String(value ?? '').replace(/[&<>"']/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
      }
      function cmdParityHighlight(value, query, key) {
        const text = String(value ?? '');
        const q = query.trim();
        if (!q) return cmdParityEscape(text);
        const lower = text.toLowerCase();
        const needle = q.toLowerCase();
        let cursor = 0;
        let markIndex = 0;
        let html = '';
        while (true) {
          const idx = lower.indexOf(needle, cursor);
          if (idx === -1) break;
          html += cmdParityEscape(text.slice(cursor, idx));
          html += `<mark data-comment="${key}-mark-${markIndex++}">${cmdParityEscape(text.slice(idx, idx + q.length))}</mark>`;
          cursor = idx + q.length;
        }
        html += cmdParityEscape(text.slice(cursor));
        return html;
      }
      function ensureCmdPaletteStructure() {
        const panel = document.getElementById('cmd-palette')?.querySelector('.cmd-palette-panel');
        if (!panel) return;
        const searchWrap = panel.querySelector('[data-comment="cmd-palette-search-wrap"]');
        if (searchWrap) {
          searchWrap.innerHTML = `
            <div data-comment="cmd-palette-search-field" class="cmd-palette-search-field">
              <i data-comment="cmd-palette-search-icon" data-lucide="search" class="w-4 h-4 text-stone-400 shrink-0"></i>
              <input id="cmd-palette-input" data-comment="cmd-palette-input" data-component="input" type="text" placeholder="Search jobs, tasks, todos..." class="flex-1 bg-transparent text-sm text-stone-900 dark:text-stone-50 placeholder:text-stone-400 outline-none border-0" autocomplete="off" oninput="onCmdPaletteInput(event)" onkeydown="onCmdPaletteKey(event)" />
              <kbd data-comment="cmd-palette-search-esc" class="cmd-kbd">ESC</kbd>
            </div>`;
        }
        const results = document.getElementById('cmd-palette-results');
        if (results) results.className = 'cmd-palette-result-scroll';
        let footer = panel.querySelector('[data-comment="cmd-palette-footer"]');
        if (!footer) {
          footer = document.createElement('div');
          footer.setAttribute('data-comment', 'cmd-palette-footer');
          footer.className = 'cmd-palette-footer';
          footer.innerHTML = `
            <div data-comment="cmd-palette-footer-navigate" class="cmd-footer-help">
              <kbd data-comment="cmd-palette-footer-up" class="cmd-kbd"><i data-comment="cmd-palette-footer-up-icon" data-lucide="arrow-up" class="w-2.5 h-2.5"></i></kbd>
              <kbd data-comment="cmd-palette-footer-down" class="cmd-kbd"><i data-comment="cmd-palette-footer-down-icon" data-lucide="arrow-down" class="w-2.5 h-2.5"></i></kbd>
              <span data-comment="cmd-palette-footer-navigate-text">Navigate</span>
            </div>
            <div data-comment="cmd-palette-footer-open" class="cmd-footer-help"><kbd data-comment="cmd-palette-footer-enter" class="cmd-kbd">↵</kbd><span data-comment="cmd-palette-footer-open-text">Open</span></div>
            <div data-comment="cmd-palette-footer-close" class="cmd-footer-help"><kbd data-comment="cmd-palette-footer-esc" class="cmd-kbd">ESC</kbd><span data-comment="cmd-palette-footer-close-text">Close</span></div>`;
          panel.appendChild(footer);
        }
      }
      function openCmdPalette() {
        const root = document.getElementById('cmd-palette');
        if (!root) return;
        ensureCmdPaletteStructure();
        root.classList.add('is-open');
        cmdParityQuery = '';
        cmdParityActiveIndex = 0;
        renderCmdPalette();
        const input = document.getElementById('cmd-palette-input');
        if (input) {
          input.value = '';
          setTimeout(() => input.focus(), 40);
        }
        if (window.lucide) lucide.createIcons();
      }
      function closeCmdPalette() {
        const root = document.getElementById('cmd-palette');
        if (root) root.classList.remove('is-open');
      }
      function onCmdPaletteInput(event) {
        cmdParityQuery = event.target.value;
        cmdParityActiveIndex = 0;
        renderCmdPalette();
      }
      function cmdFiltered() {
        const q = cmdParityQuery.trim().toLowerCase();
        if (!q || q.length < 3) return [];
        return CMD_PARITY_ITEMS.filter((item) =>
          item.title.toLowerCase().includes(q) || item.subtitle.toLowerCase().includes(q) || String(item.meta || '').toLowerCase().includes(q)
        );
      }
      function renderCmdCenteredState(type) {
        const root = document.getElementById('cmd-palette-results');
        if (!root) return;
        const query = cmdParityEscape(cmdParityQuery.trim());
        const content = {
          idle: `<p data-comment="cmd-palette-idle-text" class="text-sm text-stone-400 dark:text-stone-500 m-0">Type to search across jobs, tasks, todos...</p>`,
          short: `<p data-comment="cmd-palette-short-text" class="text-sm text-stone-400 dark:text-stone-500 m-0">Type at least 3 characters to search...</p>`,
          empty: `<i data-comment="cmd-palette-empty-icon" data-lucide="search-x" class="w-8 h-8 mb-3 opacity-30 text-stone-400"></i><p data-comment="cmd-palette-empty-text" class="text-sm text-stone-400 dark:text-stone-500 m-0">No results for <span data-comment="cmd-palette-empty-query" class="font-medium text-stone-600 dark:text-stone-300">&quot;${query}&quot;</span></p>`
        }[type];
        root.innerHTML = `<div data-comment="cmd-palette-${type}" class="flex flex-col items-center justify-center h-full text-center">${content}</div>`;
        cmdParityFlatItems = [];
        if (window.lucide) lucide.createIcons();
      }
      function renderCmdPalette() {
        ensureCmdPaletteStructure();
        const root = document.getElementById('cmd-palette-results');
        if (!root) return;
        const q = cmdParityQuery.trim();
        if (!q) { renderCmdCenteredState('idle'); return; }
        if (q.length < 3) { renderCmdCenteredState('short'); return; }
        const items = cmdFiltered();
        if (!items.length) { renderCmdCenteredState('empty'); return; }
        const groups = {};
        items.forEach((item) => { (groups[item.kind] = groups[item.kind] || []).push(item); });
        cmdParityFlatItems = [];
        const parts = [];
        CMD_PARITY_GROUP_ORDER.forEach((kind) => {
          const groupItems = groups[kind];
          if (!groupItems?.length) return;
          const meta = CMD_PARITY_GROUP_META[kind];
          parts.push(`<div data-comment="cmd-palette-section-${kind}" class="cmd-section-header"><i data-comment="cmd-palette-section-${kind}-icon" data-lucide="${meta.icon}" class="w-3.5 h-3.5 text-stone-400"></i><span data-comment="cmd-palette-section-${kind}-label">${meta.label}</span></div>`);
          groupItems.forEach((item) => {
            const index = cmdParityFlatItems.length;
            cmdParityFlatItems.push(item);
            const active = index === cmdParityActiveIndex;
            const titleKey = `cmd-palette-result-${index}-title`;
            const subtitleKey = `cmd-palette-result-${index}-subtitle`;
            const tag = item.meta ? `<span data-comment="cmd-palette-result-${index}-tag" class="cmd-tag"><span data-comment="cmd-palette-result-${index}-tag-dot" class="cmd-tag-dot" style="background:${item.metaColor || '#a8a29e'}"></span>${cmdParityEscape(item.meta)}</span>` : `<span data-comment="cmd-palette-result-${index}-kind" class="text-[10px] uppercase tracking-wider font-semibold text-stone-400 dark:text-stone-500 shrink-0">${cmdParityEscape(item.kind)}</span>`;
            parts.push(`
              <button type="button" data-comment="cmd-palette-result-${index}" data-href="${cmdParityEscape(item.href)}" onclick="selectCmdPaletteItem(${index})" onmouseenter="setCmdActiveIndex(${index})" class="cmd-result${active ? ' is-active' : ''}">
                <div data-comment="cmd-palette-result-${index}-body" class="flex-1 min-w-0">
                  <p data-comment="${titleKey}" class="text-sm font-medium text-stone-900 dark:text-stone-50 truncate m-0">${cmdParityHighlight(item.title, q, titleKey)}</p>
                  <p data-comment="${subtitleKey}" class="text-xs text-stone-400 dark:text-stone-500 truncate mt-0.5 m-0">${cmdParityHighlight(item.subtitle, q, subtitleKey)}</p>
                </div>
                ${tag}
              </button>`);
          });
        });
        root.innerHTML = parts.join('');
        if (window.lucide) lucide.createIcons();
      }
      function setCmdActiveIndex(index) {
        cmdParityActiveIndex = index;
        document.querySelectorAll('.cmd-result').forEach((button, i) => button.classList.toggle('is-active', i === index));
      }
      function selectCmdPaletteItem(index) {
        const item = cmdParityFlatItems[index];
        if (!item) return;
        closeCmdPalette();
        window.location.href = item.href;
      }
      function onCmdPaletteKey(event) {
        if (event.key === 'Escape') { event.preventDefault(); closeCmdPalette(); return; }
        if (!cmdParityFlatItems.length) return;
        if (event.key === 'ArrowDown') {
          event.preventDefault();
          setCmdActiveIndex(Math.min(cmdParityFlatItems.length - 1, cmdParityActiveIndex + 1));
        } else if (event.key === 'ArrowUp') {
          event.preventDefault();
          setCmdActiveIndex(Math.max(0, cmdParityActiveIndex - 1));
        } else if (event.key === 'Enter') {
          event.preventDefault();
          selectCmdPaletteItem(cmdParityActiveIndex);
        }
      }
      document.addEventListener('DOMContentLoaded', ensureCmdPaletteStructure);</script>
  
      <div id="cmd-palette" data-comment="cmd-palette" data-component="dialog" class="cmd-palette-root">
        <div class="cmd-palette-backdrop" onclick="closeCmdPalette()">
          <div class="cmd-palette-panel" data-comment="cmd-palette-panel" onclick="event.stopPropagation()">
            <div data-comment="cmd-palette-search-wrap" class="p-3 border-b border-stone-200 dark:border-stone-800 shrink-0">
              <div class="flex items-center gap-2.5 px-4 h-9 rounded-full bg-stone-100 dark:bg-stone-800 border border-transparent">
                <i data-lucide="search" class="w-4 h-4 text-stone-400 shrink-0"></i>
                <input id="cmd-palette-input" data-comment="cmd-palette-input" data-component="input" type="text" placeholder="Search jobs, tasks, todos..." class="flex-1 bg-transparent text-sm text-stone-900 dark:text-stone-50 placeholder:text-stone-400 outline-none border-0" oninput="onCmdPaletteInput(event)" onkeydown="onCmdPaletteKey(event)" />
                <kbd class="inline-flex items-center text-[10px] font-medium text-stone-400 border border-stone-300 dark:border-stone-600 rounded px-1.5 py-0.5 bg-white dark:bg-stone-700 leading-none">ESC</kbd>
              </div>
            </div>
            <div data-comment="cmd-palette-results" id="cmd-palette-results" class="flex-1 overflow-y-auto"></div>
          </div>
        </div>
      </div>

  </body>
</html>
