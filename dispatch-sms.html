    <script>
      (() => {
        try {
          const t = localStorage.getItem('color-mode');
          if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }

          var appTheme = localStorage.getItem('app-theme') || 'default';
          var appFont = localStorage.getItem('app-font') || 'inter';
          if (appTheme !== 'default') {
            document.documentElement.classList.add('theme-' + appTheme);
            document.documentElement.setAttribute('data-accent', '');
          }
          document.documentElement.classList.add('font-' + appFont);
        } catch (e) {}
      })();
    </script>

            <div data-comment="header-actions" role="toolbar" aria-label="Header actions" class="flex items-center gap-2">
              <button type="button" data-comment="header-search" data-component="button" aria-label="Search (CMD+K)" onclick="openCmdPalette()" class="flex items-center gap-2 w-80 h-9 px-4 rounded-full border border-transparent bg-stone-100 dark:bg-stone-900 text-stone-400 text-sm hover:border-stone-300 dark:hover:border-stone-600 transition-[border-color] duration-150 cursor-pointer">
                <i data-lucide="search" class="w-3.5 h-3.5"></i><span data-comment="header-search-text" class="flex-1 text-left text-sm">Search...</span>
                <kbd data-comment="header-search-kbd" class="hidden sm:inline-flex items-center gap-0.5 text-[10px] font-medium border border-stone-200 dark:border-stone-700 rounded px-1.5 py-0.5 leading-none">K</kbd>
              </button>
              
              <div data-comment="header-theme-picker-wrap" class="theme-picker-wrap">
                <button type="button" data-comment="header-theme-picker" data-component="button" aria-label="Change theme" onclick="toggleThemePicker(event)"
                  class="w-8 h-8 flex items-center justify-center rounded-lg text-stone-500 hover:text-stone-900 dark:text-stone-400 dark:hover:text-stone-50 hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors cursor-pointer">
                  <i data-comment="header-theme-picker-icon" data-lucide="palette" class="w-4 h-4"></i>
                </button>
                <div id="theme-picker-popover" data-comment="theme-picker-popover" data-component="popover" class="theme-picker-popover hidden" onclick="event.stopPropagation()">
                  <div id="theme-picker-content" data-comment="theme-picker-content" class="p-2 flex flex-col gap-3"></div>
                </div>
              </div>
              <button type="button" data-comment="header-darkmode-toggle" data-component="button" aria-label="Toggle dark mode" onclick="toggleColorMode()" class="w-8 h-8 flex items-center justify-center rounded-lg text-stone-400 hover:text-stone-700 dark:hover:text-stone-200 hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors cursor-pointer"><i data-lucide="moon" class="w-4 h-4 dark:hidden"></i><i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i></button>
            </div>
          </header>

          <main data-comment="main" class="flex-1 overflow-hidden">
            <section data-comment="dispatch-page" class="flex h-full overflow-hidden">
              <div data-comment="dispatch-planning" class="w-1/2 overflow-y-auto border-r border-stone-200 dark:border-stone-800 p-6">
                <h2 data-comment="dispatch-planning-title" class="text-base font-semibold text-stone-900 dark:text-stone-50 mb-4">Day Planning</h2>
                <div data-comment="dispatch-planning-columns" class="flex gap-6">
                  <div data-comment="dispatch-today" class="flex-1">
                    <p data-comment="dispatch-today-label" class="text-xs font-semibold text-stone-400 dark:text-stone-500 uppercase tracking-widest mb-3">Today</p>
                    <div data-comment="dispatch-today-list" class="flex flex-col gap-2">
                      <div data-comment="dispatch-today-card-1" class="rounded-xl border border-stone-100 dark:border-stone-800 p-3">
                        <p data-comment="dispatch-today-card-1-job" class="text-[11px] text-stone-400 dark:text-stone-500">#1042</p>
                        <p data-comment="dispatch-today-card-1-title" class="text-sm font-medium text-stone-900 dark:text-stone-50 truncate">Form wall sections A1-A4</p>
                      </div>
                      <div data-comment="dispatch-today-card-2" class="rounded-xl border border-stone-100 dark:border-stone-800 p-3">
                        <p data-comment="dispatch-today-card-2-job" class="text-[11px] text-stone-400 dark:text-stone-500">#1075</p>
                        <p data-comment="dispatch-today-card-2-title" class="text-sm font-medium text-stone-900 dark:text-stone-50 truncate">Garage slab finish</p>
                      </div>
                    </div>
                  </div>
                  <div data-comment="dispatch-tomorrow" class="flex-1">
                    <p data-comment="dispatch-tomorrow-label" class="text-xs font-semibold text-stone-400 dark:text-stone-500 uppercase tracking-widest mb-3">Tomorrow</p>
                    <div data-comment="dispatch-tomorrow-list" class="flex flex-col gap-2">
                      <div data-comment="dispatch-tomorrow-card-1" class="rounded-xl border border-stone-100 dark:border-stone-800 p-3">
                        <p data-comment="dispatch-tomorrow-card-1-job" class="text-[11px] text-stone-400 dark:text-stone-500">#1058</p>
                        <p data-comment="dispatch-tomorrow-card-1-title" class="text-sm font-medium text-stone-900 dark:text-stone-50 truncate">Order rebar staging</p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div data-comment="dispatch-wizard" class="w-1/2 overflow-hidden flex flex-col gap-5 p-6">
                <div data-comment="dispatch-wizard-header" class="flex items-start justify-between">
                  <p data-comment="dispatch-kicker" class="text-[11px] font-semibold uppercase tracking-widest text-stone-400 dark:text-stone-500">Dispatch SMS</p>
                  <p data-comment="dispatch-step-count" id="dispatch-step-count" class="text-[11px] font-semibold uppercase tracking-widest text-stone-400 dark:text-stone-500">Step 1 of 4</p>
                </div>
                <div data-comment="dispatch-stepper" data-component="tabs" id="dispatch-stepper" class="flex items-center gap-1 overflow-x-auto"></div>
                <div data-comment="dispatch-step-panel" id="dispatch-step-panel" class="flex-1 min-h-0 overflow-y-auto flex flex-col gap-4"></div>
                <div data-comment="dispatch-actions" id="dispatch-actions" class="shrink-0 pt-2 border-t border-stone-100 dark:border-stone-800 flex justify-between"></div>
              </div>
            </section>
          </main>
        </div>
      </div>
    </div>

    <div id="cmd-palette" data-comment="cmd-palette" data-component="dialog" class="cmd-palette-root">
      <div class="cmd-palette-backdrop" onclick="closeCmdPalette()">
        <div class="cmd-palette-panel" data-comment="cmd-palette-panel" onclick="event.stopPropagation()">
          <div data-comment="cmd-palette-search-wrap" class="p-3 border-b border-stone-200 dark:border-stone-800 shrink-0">
            <input id="cmd-palette-input" data-comment="cmd-palette-input" data-component="input" type="text" placeholder="Search pages..." class="w-full h-9 px-4 rounded-full bg-stone-100 dark:bg-stone-800 text-sm text-stone-900 dark:text-stone-50 placeholder:text-stone-400 outline-none border-0" oninput="renderCmdPalette()" />
          </div>
          <div data-comment="cmd-palette-results" id="cmd-palette-results" class="flex-1 overflow-y-auto"></div>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script>
      const DISPATCH_STEPS = [
        { value: 1, label: 'Select Task' },
        { value: 2, label: 'Select Crew' },
        { value: 3, label: 'Start Time' },
        { value: 4, label: 'Work Description' }
      ];
      const DISPATCH_TYPES = [
        { value: 'all', label: 'All Types', color: null },
        { value: 'Forming', label: 'Forming', color: '#3b82f6' },
        { value: 'Flatwork', label: 'Flatwork', color: '#10b981' },
        { value: 'Excavating', label: 'Excavating', color: '#f59e0b' }
      ];
      const DISPATCH_TASKS = [
        {
          id: 't1',
          jobId: 1042,
          title: 'Form wall sections A1-A4',
          jobDescr: 'Custom home foundation',
          type: 'Forming',
          foreman: 'Mark Chen',
          dateRange: 'Apr 29 - May 1',
          crew: [
            { id: 1, name: 'Mark Chen', initials: 'MC', color: '#3b82f6', position: 'Foreman' },
            { id: 2, name: 'Nazar K.', initials: 'NK', color: '#18181b', position: 'Super Admin' },
            { id: 3, name: 'Alex Morgan', initials: 'AM', color: '#10b981', position: 'Concrete Finisher' }
          ]
        },
        {
          id: 't2',
          jobId: 1058,
          title: 'Order rebar staging',
          jobDescr: 'Detached garage slab prep',
          type: 'Forming',
          foreman: 'Nazar K.',
          dateRange: 'Apr 30 - May 2',
          crew: [
            { id: 2, name: 'Nazar K.', initials: 'NK', color: '#18181b', position: 'Super Admin' },
            { id: 4, name: 'Sarah Patel', initials: 'SP', color: '#f59e0b', position: 'Crew Lead' }
          ]
        },
        {
          id: 't3',
          jobId: 1075,
          title: 'Garage slab finish',
          jobDescr: 'Residential flatwork',
          type: 'Flatwork',
          foreman: 'Alex Morgan',
          dateRange: 'Apr 29',
          crew: [
            { id: 3, name: 'Alex Morgan', initials: 'AM', color: '#10b981', position: 'Concrete Finisher' },
            { id: 5, name: 'Jamie Lee', initials: 'JL', color: '#ef4444', position: 'Laborer' }
          ]
        },
        {
          id: 't4',
          jobId: 1071,
          title: 'Footings excavation - south',
          jobDescr: 'South wing foundation',
          type: 'Excavating',
          foreman: 'Sarah Patel',
          dateRange: 'May 4 - May 6',
          crew: [
            { id: 4, name: 'Sarah Patel', initials: 'SP', color: '#f59e0b', position: 'Crew Lead' },
            { id: 6, name: 'Luis Romero', initials: 'LR', color: '#8b5cf6', position: 'Operator' }
          ]
        }
      ];
      const DISPATCH_STATE = {
        currentStep: 1,
        selectedTaskId: null,
        selectedType: 'all',
        search: ''
      };
      const escapeDispatch = (value) => String(value ?? '').replace(/[&<>"']/g, (ch) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      })[ch]);
      const dispatchSlug = (value) => String(value).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
      const dispatchType = (value) => DISPATCH_TYPES.find((t) => t.value === value) || { value, label: value, color: '#a8a29e' };
      const dispatchTask = () => DISPATCH_TASKS.find((task) => task.id === DISPATCH_STATE.selectedTaskId) || null;

      function filteredDispatchTasks() {
        const q = DISPATCH_STATE.search.trim().toLowerCase();
        return DISPATCH_TASKS.filter((task) => {
          if (DISPATCH_STATE.selectedType !== 'all' && task.type !== DISPATCH_STATE.selectedType) return false;
          if (!q) return true;
          return [task.title, task.jobDescr, task.foreman, String(task.jobId)]
            .some((part) => part.toLowerCase().includes(q));
        });
      }

      function renderDispatchStepper() {
        const root = document.getElementById('dispatch-stepper');
        if (!root) return;
        root.innerHTML = DISPATCH_STEPS.map((step, index) => {
          const isActive = step.value === DISPATCH_STATE.currentStep;
          const isBlocked = step.value > 1 && !DISPATCH_STATE.selectedTaskId;
          const buttonClasses = isActive
            ? 'bg-stone-900 text-white dark:bg-stone-50 dark:text-stone-900 shadow-sm'
            : 'bg-transparent text-stone-400 dark:text-stone-500 hover:text-stone-700 dark:hover:text-stone-300';
          return `
            <button type="button" data-comment="dispatch-step-${step.value}" data-component="button"
              ${isBlocked ? 'disabled aria-disabled="true"' : `onclick="setDispatchStep(${step.value})"`}
              class="inline-flex h-6 shrink-0 items-center gap-1.5 rounded-full ${isActive ? 'px-2.5' : 'px-1'} text-xs font-semibold whitespace-nowrap transition-colors ${buttonClasses} ${isBlocked ? 'cursor-not-allowed opacity-60' : 'cursor-pointer'}">
              <span data-comment="dispatch-step-${step.value}-number">${step.value}</span>
              <span data-comment="dispatch-step-${step.value}-label">${escapeDispatch(step.label)}</span>
            </button>
            ${index < DISPATCH_STEPS.length - 1 ? `<i data-comment="dispatch-step-${step.value}-separator" data-lucide="chevron-right" class="w-3.5 h-3.5 text-stone-300 dark:text-stone-700 shrink-0"></i>` : ''}`;
        }).join('');
      }

      function renderDispatchStepOne() {
        const tasks = filteredDispatchTasks();
        const tabs = DISPATCH_TYPES.map((tab) => {
          const slug = dispatchSlug(tab.value);
          const active = tab.value === DISPATCH_STATE.selectedType;
          return `
            <button type="button" data-comment="dispatch-type-${slug}" data-component="button" onclick="setDispatchType('${escapeDispatch(tab.value)}')"
              class="h-7 px-3 rounded-full text-sm flex items-center gap-1.5 ${active ? 'bg-white dark:bg-stone-950 font-medium text-stone-900 dark:text-stone-50' : 'text-stone-500 dark:text-stone-400 hover:text-stone-900 dark:hover:text-stone-200'}">
              ${tab.color ? `<span data-comment="dispatch-type-${slug}-dot" class="w-1.5 h-1.5 rounded-full shrink-0" style="background:${tab.color}"></span>` : ''}
              <span data-comment="dispatch-type-${slug}-label">${escapeDispatch(tab.label)}</span>
            </button>`;
        }).join('');

        return `
          <h3 data-comment="dispatch-step-title" class="text-base font-semibold text-stone-900 dark:text-stone-50">Select a Task</h3>
          <div data-comment="dispatch-search-wrap" class="relative">
            <i data-comment="dispatch-search-icon" data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-stone-400 dark:text-stone-500 pointer-events-none"></i>
            <input data-comment="dispatch-search" data-component="input" type="text" value="${escapeDispatch(DISPATCH_STATE.search)}" oninput="onDispatchSearch(event)" placeholder="Search by task, job #, or description..." class="w-full h-9 rounded-full bg-stone-100 dark:bg-stone-800 border border-transparent pl-9 pr-3 text-sm text-stone-900 dark:text-stone-50 placeholder:text-stone-400 outline-none focus:border-stone-400 dark:focus:border-stone-500" />
          </div>
          <div data-comment="dispatch-type-tabs" data-component="tabs" class="flex items-center gap-1 rounded-full bg-stone-100 dark:bg-stone-800 p-1 w-fit">${tabs}</div>
          <p data-comment="dispatch-result-count" class="text-xs text-stone-400 dark:text-stone-500 -mt-1">${tasks.length} task${tasks.length !== 1 ? 's' : ''} found</p>
          ${tasks.length ? renderDispatchTaskList(tasks) : renderDispatchEmpty()}`;
      }

      function renderDispatchTaskList(tasks) {
        return `
          <div data-comment="dispatch-task-list" class="flex flex-col gap-2">
            ${tasks.map((task) => {
              const type = dispatchType(task.type);
              const selected = task.id === DISPATCH_STATE.selectedTaskId;
              return `
                <button type="button" data-comment="dispatch-task-${task.id}" data-component="button" onclick="selectDispatchTask('${task.id}')"
                  class="flex items-start gap-3 p-3 rounded-xl border transition-colors text-left cursor-pointer ${selected ? 'border-stone-900 dark:border-stone-100 bg-stone-50 dark:bg-stone-800/60' : 'border-stone-100 dark:border-stone-800 hover:border-stone-200 dark:hover:border-stone-700 hover:bg-stone-50 dark:hover:bg-stone-800/40'}">
                  <span data-comment="dispatch-task-${task.id}-body" class="flex-1 min-w-0">
                    <span data-comment="dispatch-task-${task.id}-head" class="flex items-center gap-2 mb-1">
                      <span data-comment="dispatch-task-${task.id}-job" class="text-[11px] text-stone-400 dark:text-stone-500 shrink-0">#${task.jobId}</span>
                      <span data-comment="dispatch-task-${task.id}-title" class="text-sm font-medium text-stone-900 dark:text-stone-50 truncate">${escapeDispatch(task.title)}</span>
                    </span>
                    <span data-comment="dispatch-task-${task.id}-job-descr" class="flex items-center gap-1.5 text-xs text-stone-400 dark:text-stone-500 mb-0.5">
                      <i data-comment="dispatch-task-${task.id}-job-icon" data-lucide="hard-hat" class="w-3 h-3 shrink-0"></i>
                      <span data-comment="dispatch-task-${task.id}-job-text" class="truncate">${escapeDispatch(task.jobDescr)}</span>
                    </span>
                    <span data-comment="dispatch-task-${task.id}-foreman" class="flex items-center gap-1.5 text-xs text-stone-400 dark:text-stone-500">
                      <i data-comment="dispatch-task-${task.id}-foreman-icon" data-lucide="user" class="w-3 h-3 shrink-0"></i>
                      <span data-comment="dispatch-task-${task.id}-foreman-text" class="truncate">Foreman: ${escapeDispatch(task.foreman)}</span>
                    </span>
                  </span>
                  <span data-comment="dispatch-task-${task.id}-meta" class="flex items-center gap-2 shrink-0 mt-0.5">
                    <span data-comment="dispatch-task-${task.id}-type" class="text-[10px] font-semibold px-1.5 py-0.5 rounded" style="color:${type.color};background:${type.color}1a">${escapeDispatch(type.label)}</span>
                    ${selected ? `<span data-comment="dispatch-task-${task.id}-selected" class="w-5 h-5 rounded-full bg-stone-900 dark:bg-stone-50 flex items-center justify-center shrink-0"><i data-comment="dispatch-task-${task.id}-selected-icon" data-lucide="check" class="w-3 h-3 text-white dark:text-stone-900"></i></span>` : ''}
                  </span>
                </button>`;
            }).join('')}
          </div>`;
      }

      function renderDispatchEmpty() {
        return `
          <div data-comment="dispatch-empty-state" data-component="card" class="flex flex-col items-center justify-center gap-3 py-12 text-center">
            <div data-comment="dispatch-empty-icon" class="w-10 h-10 rounded-3xl bg-stone-50 dark:bg-stone-800 flex items-center justify-center">
              <i data-comment="dispatch-empty-icon-svg" data-lucide="hard-hat" class="w-8 h-8 text-stone-400 dark:text-stone-500"></i>
            </div>
            <div data-comment="dispatch-empty-copy">
              <p data-comment="dispatch-empty-title" class="text-sm font-semibold text-stone-900 dark:text-stone-50 m-0">No tasks found</p>
              <p data-comment="dispatch-empty-description" class="text-xs text-stone-400 dark:text-stone-500 mt-0.5 m-0">Try a different search or filter</p>
            </div>
          </div>`;
      }

      function renderDispatchStepTwo() {
        const task = dispatchTask();
        if (!task) {
          return `
            <h3 data-comment="dispatch-step-title" class="text-base font-semibold text-stone-900 dark:text-stone-50">Select Crew</h3>
            <div data-comment="dispatch-crew-empty" data-component="card" class="flex flex-col items-center justify-center gap-3 py-12 text-center">
              <div data-comment="dispatch-crew-empty-icon" class="w-10 h-10 rounded-3xl bg-stone-50 dark:bg-stone-800 flex items-center justify-center">
                <i data-comment="dispatch-crew-empty-icon-svg" data-lucide="users" class="w-8 h-8 text-stone-400 dark:text-stone-500"></i>
              </div>
              <p data-comment="dispatch-crew-empty-title" class="text-sm font-semibold text-stone-900 dark:text-stone-50 m-0">No crew assigned</p>
            </div>`;
        }
        return `
          <h3 data-comment="dispatch-step-title" class="text-base font-semibold text-stone-900 dark:text-stone-50">Select Crew</h3>
          <div data-comment="dispatch-crew-list" class="flex flex-col gap-2">
            ${task.crew.map((user, index) => {
              const row = index + 1;
              const type = dispatchType(task.type);
              return `
                <div data-comment="dispatch-crew-row-${row}" class="flex items-start gap-3 p-3 rounded-xl border border-stone-100 dark:border-stone-800">
                  <span data-comment="dispatch-crew-row-${row}-avatar" data-component="avatar" class="inline-flex items-center justify-center relative overflow-hidden w-8 h-8 rounded-full text-xs font-medium shrink-0" style="background:${user.color}33;color:${user.color}">${escapeDispatch(user.initials)}</span>
                  <div data-comment="dispatch-crew-row-${row}-body" class="flex-1 min-w-0">
                    <div data-comment="dispatch-crew-row-${row}-head" class="flex items-center gap-2 mb-1 flex-wrap">
                      <span data-comment="dispatch-crew-row-${row}-name" class="text-sm font-medium text-stone-900 dark:text-stone-50 truncate">${escapeDispatch(user.name)}</span>
                      <span data-comment="dispatch-crew-row-${row}-type" class="text-[10px] font-semibold px-1.5 py-0.5 rounded shrink-0" style="color:${type.color};background:${type.color}1a">${escapeDispatch(type.label)}</span>
                      <span data-comment="dispatch-crew-row-${row}-position" class="text-xs text-stone-400 dark:text-stone-500">${escapeDispatch(user.position)}</span>
                    </div>
                    <a data-comment="dispatch-crew-row-${row}-link" data-component="link" href="calendar.html#task-${task.id}" class="flex items-center gap-1.5 text-xs text-stone-400 dark:text-stone-500">
                      <span data-comment="dispatch-crew-row-${row}-task" class="truncate hover:underline">${escapeDispatch(task.title)}</span>
                      <span data-comment="dispatch-crew-row-${row}-separator" class="shrink-0">·</span>
                      <span data-comment="dispatch-crew-row-${row}-date" class="flex items-center gap-1 shrink-0">
                        <i data-comment="dispatch-crew-row-${row}-date-icon" data-lucide="calendar" class="w-3 h-3"></i>
                        <span data-comment="dispatch-crew-row-${row}-date-text">${escapeDispatch(task.dateRange)}</span>
                      </span>
                    </a>
                  </div>
                </div>`;
            }).join('')}
          </div>`;
      }

      function renderDispatchPanel() {
        const root = document.getElementById('dispatch-step-panel');
        if (!root) return;
        if (DISPATCH_STATE.currentStep === 1) root.innerHTML = renderDispatchStepOne();
        if (DISPATCH_STATE.currentStep === 2) root.innerHTML = renderDispatchStepTwo();
        if (DISPATCH_STATE.currentStep === 3) {
          root.innerHTML = '<h3 data-comment="dispatch-step-title" class="text-base font-semibold text-stone-900 dark:text-stone-50">Start Time</h3>';
        }
        if (DISPATCH_STATE.currentStep === 4) {
          root.innerHTML = '<h3 data-comment="dispatch-step-title" class="text-base font-semibold text-stone-900 dark:text-stone-50">Work Description</h3>';
        }
      }

      function renderDispatchActions() {
        const root = document.getElementById('dispatch-actions');
        if (!root) return;
        const nextDisabled = (DISPATCH_STATE.currentStep === 1 && !DISPATCH_STATE.selectedTaskId) || DISPATCH_STATE.currentStep >= DISPATCH_STEPS.length;
        root.innerHTML = `
          ${DISPATCH_STATE.currentStep > 1
            ? `<button type="button" data-comment="dispatch-back" data-component="button" onclick="dispatchBack()" class="inline-flex h-9 px-4 items-center justify-center gap-1.5 rounded-full text-sm border border-stone-200 dark:border-stone-700 text-stone-700 dark:text-stone-300 hover:bg-stone-100 dark:hover:bg-stone-800 cursor-pointer"><i data-comment="dispatch-back-icon" data-lucide="arrow-left" class="w-4 h-4"></i><span data-comment="dispatch-back-text">Back</span></button>`
            : '<span data-comment="dispatch-back-placeholder"></span>'}
          <button type="button" data-comment="dispatch-next" data-component="button" ${nextDisabled ? 'disabled aria-disabled="true"' : 'onclick="dispatchNext()"'} class="inline-flex h-9 px-4 items-center justify-center gap-1.5 rounded-full text-sm bg-brand-500 text-white border border-brand-500 dark:bg-white dark:text-stone-900 dark:border-white ${nextDisabled ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer hover:bg-brand-600 hover:border-brand-600 dark:hover:bg-stone-100 dark:hover:border-stone-100'}">
            <span data-comment="dispatch-next-text">Next</span>
            <i data-comment="dispatch-next-icon" data-lucide="arrow-right" class="w-4 h-4"></i>
          </button>`;
      }

      function renderDispatch() {
        const stepCount = document.getElementById('dispatch-step-count');
        if (stepCount) stepCount.textContent = `Step ${DISPATCH_STATE.currentStep} of ${DISPATCH_STEPS.length}`;
        renderDispatchStepper();
        renderDispatchPanel();
        renderDispatchActions();
        if (window.lucide) lucide.createIcons();
      }

      function setDispatchStep(step) {
        if (step > 1 && !DISPATCH_STATE.selectedTaskId) return;
        DISPATCH_STATE.currentStep = Math.max(1, Math.min(DISPATCH_STEPS.length, step));
        renderDispatch();
      }
      function setDispatchType(type) {
        DISPATCH_STATE.selectedType = type;
        DISPATCH_STATE.selectedTaskId = null;
        DISPATCH_STATE.currentStep = 1;
        renderDispatch();
      }
      function onDispatchSearch(event) {
        DISPATCH_STATE.search = event.target.value;
        DISPATCH_STATE.selectedTaskId = null;
        renderDispatch();
        const input = document.querySelector('[data-comment="dispatch-search"]');

        } else if (event.key === 'Enter') {
          event.preventDefault();
          selectCmdPaletteItem(cmdParityActiveIndex);
        }
      }
      document.addEventListener('DOMContentLoaded', ensureCmdPaletteStructure);</script>
  </body>
</html>
