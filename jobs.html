    <script>
      (function () {
        try {
          var t = localStorage.getItem('color-mode');
          if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }

          var appTheme = localStorage.getItem('app-theme') || 'default';
          var appFont = localStorage.getItem('app-font') || 'inter';
          if (appTheme !== 'default') {
            document.documentElement.classList.add('theme-' + appTheme);
            document.documentElement.setAttribute('data-accent', '');
          }
          document.documentElement.classList.add('font-' + appFont);
        } catch (e) {}
      })();
    </script>

                      <i data-lucide="hard-hat" class="w-8 h-8 text-stone-400 dark:text-stone-500"></i>
                    </div>
                    <div>
                      <p class="text-sm font-semibold text-stone-900 dark:text-stone-50 m-0">No jobs found</p>

    <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
    <script>
      function createStore(initialState) {
        let state = structuredClone(initialState);
        const listeners = new Set();
        return {
          get: () => state,
          set(updater) {
            const patch = typeof updater === 'function' ? updater(state) : updater;
            state = { ...state, ...patch };
            listeners.forEach((fn) => fn(state));
          },
          subscribe(fn) { listeners.add(fn); return () => listeners.delete(fn); }
        };
      }

      const JOB_STATUSES = [
        { value: 'Tentative',  label: 'Tentative',  dotCls: 'bg-amber-600 dark:bg-amber-400',   textCls: 'text-amber-600 dark:text-amber-400' },
        { value: 'In Process', label: 'In Process', dotCls: 'bg-blue-600 dark:bg-blue-400',     textCls: 'text-blue-600 dark:text-blue-400' },
        { value: 'Confirmed',  label: 'Confirmed',  dotCls: 'bg-emerald-600 dark:bg-emerald-400', textCls: 'text-emerald-600 dark:text-emerald-400' },
        { value: 'Closed',     label: 'Closed',     dotCls: 'bg-stone-500 dark:bg-stone-400',   textCls: 'text-stone-500 dark:text-stone-400' }
      ];
      const jobStatus = (v) => JOB_STATUSES.find((s) => s.value === v) ?? { value: v, label: v, dotCls: 'bg-stone-500 dark:bg-stone-400', textCls: 'text-stone-500 dark:text-stone-400' };

      const CUSTOMERS = [
        { id: 'C001', l_name: 'Westbrook Holdings',     f_name: 'James',  city: 'Toronto',    state: 'ON', country: 'Canada' },
        { id: 'C002', l_name: 'Greenfield Industries',  f_name: 'Sarah',  city: 'Hamilton',   state: 'ON', country: 'Canada' },
        { id: 'C003', l_name: 'Lakeside Properties',    f_name: 'David',  city: 'Mississauga',state: 'ON', country: 'Canada' },
        { id: 'C004', l_name: 'Riverside Utilities',    f_name: 'Emma',   city: 'Burlington', state: 'ON', country: 'Canada' },
        { id: 'C005', l_name: 'Northpoint Construction',f_name: 'Michael',city: 'Guelph',     state: 'ON', country: 'Canada' },
        { id: 'C006', l_name: 'Summit Developments',    f_name: 'Olivia', city: 'Kitchener',  state: 'ON', country: 'Canada' },
        { id: 'C007', l_name: 'Heritage Estates',       f_name: 'Liam',   city: 'Cambridge',  state: 'ON', country: 'Canada' },
        { id: 'C008', l_name: 'Peak Property Group',    f_name: 'Noah',   city: 'Brampton',   state: 'ON', country: 'Canada' },
        { id: 'C009', l_name: 'Cedar Park Residential', f_name: 'Ava',    city: 'Oakville',   state: 'ON', country: 'Canada' },
        { id: 'C010', l_name: 'Stonebridge Homes',      f_name: 'Mason',  city: 'Milton',     state: 'ON', country: 'Canada' }
      ];

      function isoOffset(d) { return new Date(Date.now() + d * 86400000).toISOString().slice(0, 10); }

      const STATUS_VALS = JOB_STATUSES.map(s => s.value);
      const CITIES = ['Toronto','Hamilton','Mississauga','Burlington','Guelph','Kitchener','Cambridge','Brampton','Oakville','Milton'];
      const DESCRS = [
        'Foundation pour — north wing',
        'Driveway flatwork installation',
        'Retaining wall — east elevation',
        'Basement excavation and footings',
        'Sidewalk replacement project',
        'Garage slab and curbs',
        'Commercial parking lot pour',
        'Residential foundation package',
        'Storm sewer trenching',
        'Concrete steps and walkways',
        'Industrial floor pour — phase 2',
        'Curb and gutter installation',
        'Patio and pool deck flatwork',
        'Footings for utility expansion',
        'Warehouse loading dock'
      ];

      const JOBS = Array.from({ length: 47 }, (_, i) => {
        const status = STATUS_VALS[i % STATUS_VALS.length];
        const cust = CUSTOMERS[i % CUSTOMERS.length];
        const beginOffset = -90 + i * 4;
        return {
          job_id: 1000 + i + 1,
          descr: DESCRS[i % DESCRS.length],
          status,
          customerid: cust.id,
          l_city: CITIES[i % CITIES.length],
          l_state: 'ON',
          begin_date: isoOffset(beginOffset),
          end_date: isoOffset(beginOffset + 14)
        };
      });

      const store = createStore({
        jobs: JOBS,
        customers: CUSTOMERS,
        filters: { search: '', status: [], customerid: '', sortField: 'begin_date', sortOrder: -1, page: 1, limit: 25 },
        openSelect: null,
        sidebarCollapsed: false,
        sidebarMobileOpen: false
      });

      function el(tag, attrs = {}, children = []) {
        const node = document.createElement(tag);
        for (const [k, v] of Object.entries(attrs)) {
          if (v == null || v === false) continue;
          if (k === 'class') node.className = v;
          else if (k === 'style') node.setAttribute('style', v);
          else if (k.startsWith('on') && typeof v === 'function') node[k] = v;
          else node.setAttribute(k, v === true ? '' : v);
        }
        for (const c of [].concat(children)) {
          if (c == null || c === false) continue;
          node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
        }
        return node;
      }
      const lucideEl = (name, cls, extra = {}) => el('i', { 'data-lucide': name, class: cls, ...extra });
      const clear = (n) => { while (n.firstChild) n.removeChild(n.firstChild); };
      const formatShortDate = (iso) => new Date(iso + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

      function customerName(id) { return store.get().customers.find((c) => c.id === id)?.l_name ?? id; }

      function filteredJobs() {
        const { jobs, filters } = store.get();
        let out = jobs.filter((j) => {
          if (filters.search) {
            const q = filters.search.toLowerCase();
            if (!String(j.job_id).includes(q) && !j.descr.toLowerCase().includes(q) && !j.l_city.toLowerCase().includes(q)) return false;
          }
          if (filters.status.length && !filters.status.includes(j.status)) return false;
          if (filters.customerid && j.customerid !== filters.customerid) return false;
          return true;
        });
        const f = filters.sortField;
        if (f) {
          out = out.slice().sort((a, b) => {
            const av = a[f] ?? '';
            const bv = b[f] ?? '';
            const cmp = av < bv ? -1 : av > bv ? 1 : 0;
            return filters.sortOrder === -1 ? -cmp : cmp;
          });
        }
        return out;
      }

      function paged(list) {
        const { page, limit } = store.get().filters;
        const start = (page - 1) * limit;
        return list.slice(start, start + limit);
      }

      function selectInner(opts) {
        const { wrap, options, value, placeholder, onChange, dataComment, currentLabelFn, multi, showFilter } = opts;
        clear(wrap);

        const trigger = el('button', {
          type: 'button',
          'data-comment': `${dataComment}-trigger`,
          'aria-haspopup': 'listbox',
          'aria-expanded': String(store.get().openSelect === dataComment),
          class: 'select-trigger w-full',
          onclick: (e) => { e.stopPropagation(); toggleSelect(dataComment); }
        });
        const valueWrap = el('div', { class: 'flex-1 min-w-0 flex items-center gap-1.5 truncate' });

        if (multi) {
          if (!value || !value.length) {
            valueWrap.appendChild(el('span', { class: 'text-stone-400 dark:text-stone-500' }, placeholder));
          } else if (value.length === 1) {
            currentLabelFn(valueWrap, options.find((o) => o.value === value[0]));
          } else {
            valueWrap.appendChild(document.createTextNode(`${placeholder}(${value.length})`));
          }
        } else {
          const sel = options.find((o) => String(o.value) === String(value));
          if (sel && value !== '' && value != null) {
            if (currentLabelFn) currentLabelFn(valueWrap, sel);
            else valueWrap.appendChild(document.createTextNode(sel.label));
          } else {
            valueWrap.appendChild(el('span', { class: 'text-stone-400 dark:text-stone-500' }, placeholder));
          }
        }
        trigger.appendChild(valueWrap);
        trigger.appendChild(lucideEl('chevron-down', 'w-4 h-4 text-stone-400 shrink-0'));
        wrap.appendChild(trigger);

        if (store.get().openSelect === dataComment) {
          const panel = el('div', { class: 'select-panel', 'data-comment': `${dataComment}-panel`, onclick: (e) => e.stopPropagation() });
          if (showFilter) {
            const fwrap = el('div', { class: 'p-1.5 sticky top-0 bg-white dark:bg-stone-950' });
            const fInput = el('input', {
              type: 'text', placeholder: 'Search...',
              class: 'vol-input w-full', value: opts.filterValue || '',
              oninput: (e) => opts.onFilter && opts.onFilter(e.target.value)
            });
            fwrap.appendChild(fInput);
            panel.appendChild(fwrap);
          }
          for (const o of options) {
            const isActive = multi ? value.includes(o.value) : String(o.value) === String(value);
            const optEl = el('div', {
              'data-comment': `${dataComment}-option-${o.value || 'all'}`,
              class: `select-option${isActive ? ' is-active' : ''}`,
              role: 'option',
              onclick: () => onChange(o.value)
            });
            if (multi) {
              const cb = el('span', { class: 'inline-flex items-center justify-center w-3.5 h-3.5 border border-stone-300 dark:border-stone-600 rounded shrink-0' });
              if (isActive) {
                cb.classList.add('bg-brand-500', 'border-brand-500', 'dark:bg-white', 'dark:border-white');
                cb.appendChild(lucideEl('check', 'w-2.5 h-2.5 text-white dark:text-stone-900'));
              }
              optEl.appendChild(cb);
            }
            if (o.dot) optEl.appendChild(el('span', { class: `w-2 h-2 rounded-full shrink-0 ${o.dot}` }));
            if (o.optionRender) o.optionRender(optEl);
            else optEl.appendChild(document.createTextNode(o.label));
            panel.appendChild(optEl);
          }
          if (!options.length) {
            panel.appendChild(el('p', { class: 'px-3 py-1.5 text-sm text-stone-400 dark:text-stone-500' }, opts.emptyText || 'No options'));
          }
          wrap.appendChild(panel);
        }
      }

      function renderFilterCustomer() {
        const f = store.get().filters;
        const cs = store.get().customers;
        const customerFilterValue = store.get().customerFilterValue || '';
        const filtered = customerFilterValue.length >= 3
          ? cs.filter((c) => `${c.l_name} ${c.f_name} ${c.id} ${c.city}`.toLowerCase().includes(customerFilterValue.toLowerCase()))
          : [];

        selectInner({
          wrap: document.getElementById('filter-customer'),
          dataComment: 'filter-customer',
          placeholder: 'Customer',
          value: f.customerid,
          showFilter: true,
          filterValue: customerFilterValue,
          onFilter: (v) => store.set({ customerFilterValue: v }),
          emptyText: customerFilterValue.length < 3 ? 'Type at least 3 characters' : 'No customers found',
          options: [
            ...(f.customerid ? [{ value: '', label: 'Clear customer' }] : []),
            ...filtered.map((c) => ({
              value: c.id, label: c.l_name,
              optionRender: (root) => {
                const wrap = el('div', { class: 'flex flex-col min-w-0' });
                wrap.appendChild(el('span', { class: 'text-sm font-medium text-stone-900 dark:text-stone-100 truncate' }, [c.l_name, c.f_name].filter(Boolean).join(' ')));
                if (c.city || c.state) wrap.appendChild(el('span', { class: 'text-xs text-stone-400 dark:text-stone-500 truncate' }, [c.city, c.state, c.country].filter(Boolean).join(', ')));
                root.appendChild(wrap);
              }
            }))
          ],
          onChange: (v) => { setFilter('customerid', v); store.set({ openSelect: null }); },
          emptyText: 'No customers found'
        });
      }

      function renderFilterStatus() {
        const f = store.get().filters;
        selectInner({
          wrap: document.getElementById('filter-status'),
          dataComment: 'filter-status',
          placeholder: 'Status',
          value: f.status,
          multi: true,
          options: JOB_STATUSES.map((s) => ({ value: s.value, label: s.label, dot: s.dotCls })),
          onChange: (v) => {
            const cur = store.get().filters.status;
            const next = cur.includes(v) ? cur.filter(x => x !== v) : [...cur, v];
            setFilter('status', next);
          },
          currentLabelFn: (wrap, sel) => {
            wrap.appendChild(el('span', { class: `w-2 h-2 rounded-full shrink-0 ${sel.dot}` }));
            wrap.appendChild(document.createTextNode(sel.label));
          }
        });
      }

      function renderActiveFilters() {
        const f = store.get().filters;
        const active = [];
        if (f.search) active.push({ key: 'search', label: `"${f.search}"`, clear: () => { setFilter('search', ''); document.getElementById('search-input').value = ''; updateSearchClear(); } });
        f.status.forEach((s) => active.push({ key: `status-${s}`, label: jobStatus(s).label, clear: () => setFilter('status', f.status.filter(x => x !== s)) }));
        if (f.customerid) active.push({ key: 'customerid', label: customerName(f.customerid), clear: () => setFilter('customerid', '') });

        const root = document.getElementById('active-filters');
        clear(root);
        if (!active.length) { root.classList.add('hidden'); return; }
        root.classList.remove('hidden');
        for (const a of active) {
          const chip = el('span', {
            'data-comment': `active-filter-${a.key}`,
            'data-component': 'badge',
            class: 'inline-flex items-center gap-1.5 rounded-lg px-2.5 py-1 text-xs font-medium bg-stone-100 dark:bg-stone-800 text-stone-600 dark:text-stone-300 border border-stone-200 dark:border-stone-700'
          }, a.label);
          const close = el('button', {
            type: 'button',
            'data-comment': `active-filter-${a.key}-remove`,
            'aria-label': 'Remove filter',
            onclick: a.clear,

            btn.onmouseenter = () => { cmdActiveIndex = idx; document.querySelectorAll('.cmd-result').forEach((b, i) => b.classList.toggle('is-active', i === idx)); };
            const ic = document.createElement('i'); ic.setAttribute('data-lucide', it.icon); ic.className = 'w-4 h-4 shrink-0 text-stone-400';

            const s = document.createElement('p'); s.className = 'text-xs text-stone-400 dark:text-stone-500 truncate mt-0.5 m-0'; s.textContent = it.subtitle;

        if (window.lucide) lucide.createIcons();
      }
      function onCmdPaletteKey(e) {

        else if (e.key === 'ArrowUp') { e.preventDefault(); cmdActiveIndex = Math.max(0, cmdActiveIndex - 1); renderCmdPalette(); }

      // Command Palette parity

      const CMD_PARITY_GROUP_META = {
        page: { label: 'Pages', icon: 'layout-grid' },
        job: { label: 'Jobs', icon: 'hard-hat' },
        task: { label: 'Tasks', icon: 'hammer' },
        todo: { label: 'Todos', icon: 'check-square' },
        user: { label: 'Users', icon: 'users' }
      };
      const CMD_PARITY_GROUP_ORDER = ['page', 'job', 'task', 'todo', 'user'];
      let cmdParityActiveIndex = 0;
      let cmdParityQuery = '';
      let cmdParityFlatItems = [];
      function cmdParityEscape(value) {
        return String(value ?? '').replace(/[&<>"']/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
      }
      function cmdParityHighlight(value, query, key) {
        const text = String(value ?? '');
        const q = query.trim();
        if (!q) return cmdParityEscape(text);
        const lower = text.toLowerCase();
        const needle = q.toLowerCase();
        let cursor = 0;
        let markIndex = 0;
        let html = '';
        while (true) {
          const idx = lower.indexOf(needle, cursor);
          if (idx === -1) break;
          html += cmdParityEscape(text.slice(cursor, idx));
          html += `<mark data-comment="${key}-mark-${markIndex++}">${cmdParityEscape(text.slice(idx, idx + q.length))}</mark>`;
          cursor = idx + q.length;
        }
        html += cmdParityEscape(text.slice(cursor));
        return html;
      }
      function ensureCmdPaletteStructure() {
        const panel = document.getElementById('cmd-palette')?.querySelector('.cmd-palette-panel');
        if (!panel) return;
        const searchWrap = panel.querySelector('[data-comment="cmd-palette-search-wrap"]');
        if (searchWrap) {
          searchWrap.innerHTML = `
            <div data-comment="cmd-palette-search-field" class="cmd-palette-search-field">

            </div>`;
        }

        if (results) results.className = 'cmd-palette-result-scroll';
        let footer = panel.querySelector('[data-comment="cmd-palette-footer"]');
        if (!footer) {
          footer = document.createElement('div');
          footer.setAttribute('data-comment', 'cmd-palette-footer');
          footer.className = 'cmd-palette-footer';
          footer.innerHTML = `
            <div data-comment="cmd-palette-footer-navigate" class="cmd-footer-help">

            <div data-comment="cmd-palette-footer-close" class="cmd-footer-help"><kbd data-comment="cmd-palette-footer-esc" class="cmd-kbd">ESC</kbd><span data-comment="cmd-palette-footer-close-text">Close</span></div>`;
          panel.appendChild(footer);
        }

      function openCmdPalette() {
        const root = document.getElementById('cmd-palette');

        cmdParityActiveIndex = 0;

        const input = document.getElementById('cmd-palette-input');

      function closeCmdPalette() {
        const root = document.getElementById('cmd-palette');

      function onCmdPaletteInput(event) {
        cmdParityQuery = event.target.value;
        cmdParityActiveIndex = 0;
        renderCmdPalette();
      }
      function cmdFiltered() {
        const q = cmdParityQuery.trim().toLowerCase();
        if (!q || q.length < 3) return [];
        return CMD_PARITY_ITEMS.filter((item) =>
          item.title.toLowerCase().includes(q) || item.subtitle.toLowerCase().includes(q) || String(item.meta || '').toLowerCase().includes(q)
        );
      }
      function renderCmdCenteredState(type) {
        const root = document.getElementById('cmd-palette-results');
        if (!root) return;
        const query = cmdParityEscape(cmdParityQuery.trim());

          idle: `<p data-comment="cmd-palette-idle-text" class="text-sm text-stone-400 dark:text-stone-500 m-0">Type to search across jobs, tasks, todos...</p>`,
          short: `<p data-comment="cmd-palette-short-text" class="text-sm text-stone-400 dark:text-stone-500 m-0">Type at least 3 characters to search...</p>`,
          empty: `<i data-comment="cmd-palette-empty-icon" data-lucide="search-x" class="w-8 h-8 mb-3 opacity-30 text-stone-400"></i><p data-comment="cmd-palette-empty-text" class="text-sm text-stone-400 dark:text-stone-500 m-0">No results for <span data-comment="cmd-palette-empty-query" class="font-medium text-stone-600 dark:text-stone-300">&quot;${query}&quot;</span></p>`
        }[type];
        root.innerHTML = `<div data-comment="cmd-palette-${type}" class="flex flex-col items-center justify-center h-full text-center">${content}</div>`;
        cmdParityFlatItems = [];

      function renderCmdPalette() {
        ensureCmdPaletteStructure();
        const root = document.getElementById('cmd-palette-results');
        if (!root) return;
        const q = cmdParityQuery.trim();
        if (!q) { renderCmdCenteredState('idle'); return; }
        if (q.length < 3) { renderCmdCenteredState('short'); return; }
        const items = cmdFiltered();
        if (!items.length) { renderCmdCenteredState('empty'); return; }
        const groups = {};
        items.forEach((item) => { (groups[item.kind] = groups[item.kind] || []).push(item); });
        cmdParityFlatItems = [];
        const parts = [];
        CMD_PARITY_GROUP_ORDER.forEach((kind) => {
          const groupItems = groups[kind];
          if (!groupItems?.length) return;
          const meta = CMD_PARITY_GROUP_META[kind];
          parts.push(`<div data-comment="cmd-palette-section-${kind}" class="cmd-section-header"><i data-comment="cmd-palette-section-${kind}-icon" data-lucide="${meta.icon}" class="w-3.5 h-3.5 text-stone-400"></i><span data-comment="cmd-palette-section-${kind}-label">${meta.label}</span></div>`);
          groupItems.forEach((item) => {
            const index = cmdParityFlatItems.length;
            cmdParityFlatItems.push(item);
            const active = index === cmdParityActiveIndex;
            const titleKey = `cmd-palette-result-${index}-title`;
            const subtitleKey = `cmd-palette-result-${index}-subtitle`;
            const tag = item.meta ? `<span data-comment="cmd-palette-result-${index}-tag" class="cmd-tag"><span data-comment="cmd-palette-result-${index}-tag-dot" class="cmd-tag-dot" style="background:${item.metaColor || '#a8a29e'}"></span>${cmdParityEscape(item.meta)}</span>` : `<span data-comment="cmd-palette-result-${index}-kind" class="text-[10px] uppercase tracking-wider font-semibold text-stone-400 dark:text-stone-500 shrink-0">${cmdParityEscape(item.kind)}</span>`;
            parts.push(`
              <button type="button" data-comment="cmd-palette-result-${index}" data-href="${cmdParityEscape(item.href)}" onclick="selectCmdPaletteItem(${index})" onmouseenter="setCmdActiveIndex(${index})" class="cmd-result${active ? ' is-active' : ''}">
                <div data-comment="cmd-palette-result-${index}-body" class="flex-1 min-w-0">
                  <p data-comment="${titleKey}" class="text-sm font-medium text-stone-900 dark:text-stone-50 truncate m-0">${cmdParityHighlight(item.title, q, titleKey)}</p>
                  <p data-comment="${subtitleKey}" class="text-xs text-stone-400 dark:text-stone-500 truncate mt-0.5 m-0">${cmdParityHighlight(item.subtitle, q, subtitleKey)}</p>
                </div>
                ${tag}
              </button>`);
          });
        });
        root.innerHTML = parts.join('');
        if (window.lucide) lucide.createIcons();
      }
      function setCmdActiveIndex(index) {
        cmdParityActiveIndex = index;
        document.querySelectorAll('.cmd-result').forEach((button, i) => button.classList.toggle('is-active', i === index));
      }
      function selectCmdPaletteItem(index) {
        const item = cmdParityFlatItems[index];
        if (!item) return;
        closeCmdPalette();
        window.location.href = item.href;
      }
      function onCmdPaletteKey(event) {
        if (event.key === 'Escape') { event.preventDefault(); closeCmdPalette(); return; }
        if (!cmdParityFlatItems.length) return;
        if (event.key === 'ArrowDown') {
          event.preventDefault();
          setCmdActiveIndex(Math.min(cmdParityFlatItems.length - 1, cmdParityActiveIndex + 1));
        } else if (event.key === 'ArrowUp') {
          event.preventDefault();
          setCmdActiveIndex(Math.max(0, cmdParityActiveIndex - 1));
        } else if (event.key === 'Enter') {
          event.preventDefault();
          selectCmdPaletteItem(cmdParityActiveIndex);
        }
      }
      document.addEventListener('DOMContentLoaded', ensureCmdPaletteStructure);</script>
